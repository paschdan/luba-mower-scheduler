# =============================================================================
# Luba Mower dashboard view  (paschdan live install)
# =============================================================================
# One-automation strict-alternation setup. No more scheduler-card / windows;
# just the "next zone to mow" select in the controls card.
# =============================================================================

title: Mäher
path: maeher
icon: mdi:robot-mower
cards:
  # ---- Controls -----------------------------------------------------------
  - type: entities
    title: Mow Controls
    entities:
      - entity: input_boolean.mowing_automation_enabled
        name: Scheduler aktiv
      - entity: input_boolean.do_not_mow
        name: Nicht mähen (auto - Regen/Nacht)
      - entity: input_boolean.block_night_mowing
        name: Nachts blockieren
      - entity: input_select.next_zone_to_mow
        name: Nächste Zone
      - entity: input_text.reason_no_mow
        name: Grund

  # ---- Mower status -------------------------------------------------------
  - type: glance
    title: Yuka
    entities:
      - entity: lawn_mower.yuka_mnu7nps5
        name: Status
      - entity: sensor.yuka_mnu7nps5_battery
        name: Akku
      - entity: input_text.last_lawn_mowed
        name: Letzte Fläche

  # ---- Weather ------------------------------------------------------------
  - type: entities
    title: Wetter
    entities:
      - entity: sensor.rain_today
        name: Regen heute (mm)
      - entity: sensor.rain_probability
        name: Regenwahrscheinlichkeit (max %)
      - entity: sensor.rain_current_hour
        name: Regen aktuelle Stunde (mm)
      - entity: sensor.rain_last_3h
        name: Regen letzte 3h (mm)
      - entity: sensor.rain_last_6h
        name: Regen letzte 6h (mm)
      - entity: weather.forecast_home
        name: Vorhersage

  # ---- Garten card (manual mow + days-since sensor) -----------------------
  - type: entities
    title: Garten
    entities:
      - entity: sensor.garten_days_since_mow
        name: Tage seit letztem Mähen
      - entity: input_datetime.garten_last_mow_1
        name: Zuletzt gemäht
      - type: button
        name: Garten jetzt mähen
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_garten

  # ---- Seite card (manual mow + days-since sensor) ------------------------
  - type: entities
    title: Seite
    entities:
      - entity: sensor.seite_days_since_mow
        name: Tage seit letztem Mähen
      - entity: input_datetime.seite_last_mow_1
        name: Zuletzt gemäht
      - type: button
        name: Seite jetzt mähen
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_seite

  # ---- Camera + live map --------------------------------------------------
  - type: custom:map-card
    theme_mode: light
    focus_entity: device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
    zoom: 20
    card_size: 7
    tile_layers:
      - url: https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
        options:
          maxZoom: 24
          maxNativeZoom: 18
          minZoom: 14
          detectRetina: true
    map_options:
      maxZoom: 24
      minZoom: 14
    plugins:
      - name: geoJson
        url: /hacsfiles/ha-mammotion-assets/dist/geojson.js
        options:
          rotation_deg: 0
          entity_id: lawn_mower.yuka_mnu7nps5
    entities:
      - entity: device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
        picture: /hacsfiles/ha-mammotion-assets/dist/assets/map/dc_newui_icon_map_yuka_mn_white.png
        size: 30
        display: marker
