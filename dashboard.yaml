# =============================================================================
# Luba Mower dashboard view  (paschdan live install, scheduler-component)
# =============================================================================
# Uses nielsfaber/scheduler-card for the timing side of things. All the
# input_select "Frequency" and input_datetime "Next Mow" rows the previous
# version had are gone — scheduler-card owns those entirely.
#
# Requirements:
#   - HACS integration:  nielsfaber/scheduler-component
#   - HACS Lovelace:     nielsfaber/scheduler-card  (adds custom:scheduler-card)
#
# Add as a new dashboard view via raw config editor.
#
# Wired entities (from the paschdan/personal live install):
#   Mower       : lawn_mower.yuka_mnu7nps5
#   Battery     : sensor.yuka_mnu7nps5_battery
#   Tracker     : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   Camera      : camera.yuka_mnu7nps5_none  (custom:map-card variant used below)
#   Buttons     : button.garten_yuka_mnu7nps5_aufgabe_1  (Garten)
#                 button.garten_yuka_mnu7nps5_aufgabe_3  (Seite)
#   Schedules   : switch.schedule_garten_mahen / switch.schedule_seite_mahen
#                 (created via scheduler.add — see package README)
# =============================================================================

title: Mäher
path: maeher
icon: mdi:robot-mower
cards:
  # ---- Controls -----------------------------------------------------------
  - type: entities
    title: Mow Controls
    entities:
      - entity: input_boolean.mowing_automation_enabled
        name: Scheduler aktiv
      - entity: input_boolean.do_not_mow
        name: Nicht mähen (auto - Regen/Nacht)
      - entity: input_boolean.block_night_mowing
        name: Nachts blockieren
      - entity: input_text.reason_no_mow
        name: Grund

  # ---- Mower status -------------------------------------------------------
  - type: glance
    title: Yuka
    entities:
      - entity: lawn_mower.yuka_mnu7nps5
        name: Status
      - entity: sensor.yuka_mnu7nps5_battery
        name: Akku
      - entity: input_text.last_lawn_mowed
        name: Letzte Fläche

  # ---- Weather ------------------------------------------------------------
  - type: entities
    title: Wetter
    entities:
      - entity: sensor.rain_today
        name: Regen heute (mm)
      - entity: sensor.rain_probability
        name: Regenwahrscheinlichkeit (max %)
      - entity: weather.forecast_home
        name: Vorhersage

  # ---- Schedules (scheduler-card) -----------------------------------------
  # Only show the mower schedules, not any other schedule entities that may
  # exist (e.g. the watering schedule). discover_existing: false pins the
  # card to the include list.
  #
  # NOTE: `include:` must list the entities that the schedules ACT ON, not
  # the schedule switch entity_ids themselves. Our schedules toggle the
  # per-zone window helpers, so those go here.
  - type: custom:scheduler-card
    title: Mähplan
    include:
      - input_boolean.garten_mow_window
      - input_boolean.seite_mow_window
    discover_existing: false
    time_step: 15
    show_add_button: true
    display_options:
      primary_info: default
      secondary_info:
        - relative-time
        - days
        - time
        - additional-tasks
      icon: action
    show_toggle_switches: true
    show_header_toggle: false

  # ---- Garten card (window state + manual mow + days-since sensor) --------
  - type: entities
    title: Garten
    entities:
      - entity: input_boolean.garten_mow_window
        name: Mäh-Fenster offen
      - entity: sensor.garten_days_since_mow
        name: Tage seit letztem Mähen
      - type: button
        name: Garten jetzt mähen
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_garten

  # ---- Seite card (window state + manual mow + days-since sensor) ---------
  - type: entities
    title: Seite
    entities:
      - entity: input_boolean.seite_mow_window
        name: Mäh-Fenster offen
      - entity: sensor.seite_days_since_mow
        name: Tage seit letztem Mähen
      - type: button
        name: Seite jetzt mähen
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_seite

  # ---- Camera + live map --------------------------------------------------
  # ha-mammotion-assets ships a custom:map-card variant with a geojson plugin
  # that overlays the mower's mowing area on the map. If you don't have that
  # HACS integration, swap this for a plain built-in `type: map` card.
  - type: custom:map-card
    theme_mode: light
    focus_entity: device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
    zoom: 20
    card_size: 7
    tile_layers:
      - url: https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
        options:
          maxZoom: 24
          maxNativeZoom: 18
          minZoom: 14
          detectRetina: true
    map_options:
      maxZoom: 24
      minZoom: 14
    plugins:
      - name: geoJson
        url: /hacsfiles/ha-mammotion-assets/dist/geojson.js
        options:
          rotation_deg: 0
          entity_id: lawn_mower.yuka_mnu7nps5
    entities:
      - entity: device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
        picture: /hacsfiles/ha-mammotion-assets/dist/assets/map/dc_newui_icon_map_yuka_mn_white.png
        size: 30
        display: marker
