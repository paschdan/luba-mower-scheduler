# =============================================================================
# Luba Mower dashboard view  (paschdan live install)
# =============================================================================
# Pre-wired against the actual entities in this HA instance:
#
#   Mower       : lawn_mower.yuka_mnu7nps5
#   Battery     : sensor.yuka_mnu7nps5_battery
#   Tracker     : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   Camera      : camera.yuka_mnu7nps5_none
#   Buttons     : button.garten_yuka_mnu7nps5_aufgabe_1  (Garten)
#                 button.garten_yuka_mnu7nps5_aufgabe_3  (Seite)
#
# Add as a new dashboard view:
#   Settings > Dashboards > (your dashboard) > Edit > raw configuration editor,
# then paste the block below under `views:`.
# =============================================================================

title: Mäher
path: maeher
icon: mdi:robot-mower
cards:
  # ---- Controls -----------------------------------------------------------
  - type: entities
    title: Mow Controls
    entities:
      - entity: input_boolean.mowing_automation_enabled
        name: Scheduler aktiv
      - entity: input_boolean.do_not_mow
        name: Nicht mähen (auto - Regen/Nacht)
      - entity: input_boolean.block_night_mowing
        name: Nachts blockieren
      - entity: input_text.reason_no_mow
        name: Grund

  # ---- Mower status -------------------------------------------------------
  - type: glance
    title: Yuka
    entities:
      - entity: lawn_mower.yuka_mnu7nps5
        name: Status
      - entity: sensor.yuka_mnu7nps5_battery
        name: Akku
      - entity: input_text.last_lawn_mowed
        name: Letzte Fläche

  # ---- Live map (built-in map card, auto-centres on the mower) ------------
  - type: map
    title: Position
    entities:
      - device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
    hours_to_show: 24

  # ---- Camera -------------------------------------------------------------
  - type: picture-entity
    title: Kamera
    entity: camera.yuka_mnu7nps5_none
    camera_view: live
    show_state: false

  # ---- Rain (from Met.no template sensors defined in the package) ---------
  - type: entities
    title: Wetter
    entities:
      - entity: sensor.rain_today
        name: Regen heute (mm)
      - entity: sensor.rain_probability
        name: Regenwahrscheinlichkeit (max %)
      - entity: weather.forecast_home
        name: Vorhersage

  # ---- Garten (zone 1) ----------------------------------------------------
  - type: entities
    title: Garten
    entities:
      - entity: input_select.garten_schedule
        name: Häufigkeit
      - entity: input_datetime.garten_next_time
        name: Nächster Mähtermin
      - entity: sensor.garten_days_since_mow
        name: Tage seit letztem Mähen
      - type: button
        name: Garten jetzt mähen
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_lawn
          data:
            zone_slug: garten
            zone_button: button.garten_yuka_mnu7nps5_aufgabe_1
            zone_label: Garten

  # ---- Seite (zone 2) -----------------------------------------------------
  - type: entities
    title: Seite
    entities:
      - entity: input_select.seite_schedule
        name: Häufigkeit
      - entity: input_datetime.seite_next_time
        name: Nächster Mähtermin
      - entity: sensor.seite_days_since_mow
        name: Tage seit letztem Mähen
      - type: button
        name: Seite jetzt mähen
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_lawn
          data:
            zone_slug: seite
            zone_button: button.garten_yuka_mnu7nps5_aufgabe_3
            zone_label: Seite
