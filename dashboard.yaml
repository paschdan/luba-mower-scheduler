# Example Lovelace view for the mower scheduler.
#
# Uses only BUILT-IN cards (no HACS card required). Add it as a new dashboard
# view: Settings > Dashboards > (your dashboard) > Edit > raw configuration
# editor, then paste this under `views:`. Or paste individual cards via the UI.
#
# Replace the placeholder entities with yours:
#   lawn_mower.mower            -> your mower
#   sensor.mower_battery        -> your mower battery sensor
#   device_tracker.mower        -> your mower GPS tracker (provided by the integration)
#   camera.mower                -> your mower camera (Luba 2/3 with camera; optional)
#   button.mower_lawn_1/2/3     -> your saved-task buttons (optional manual-mow buttons)

title: Mower
path: mower
icon: mdi:robot-mower
cards:
  # ---- Controls -----------------------------------------------------------
  - type: entities
    title: Mowing Controls
    entities:
      - entity: input_boolean.mowing_automation_enabled
        name: Scheduler enabled
      - entity: input_boolean.do_not_mow
        name: Do not mow (auto - rain/night)
      - entity: input_boolean.block_night_mowing
        name: Block night mowing
      - entity: input_text.reason_no_mow
        name: Reason

  # ---- Mower status -------------------------------------------------------
  - type: glance
    title: Mower
    entities:
      - entity: lawn_mower.mower
        name: State
      - entity: sensor.mower_battery
        name: Battery
      - entity: input_text.last_lawn_mowed
        name: Last lawn

  # ---- Live map (built-in map card, auto-centres on the mower) -------------
  - type: map
    title: Mower Location
    entities:
      - device_tracker.mower
    hours_to_show: 24

  # ---- Camera (optional; remove if your model has no camera) --------------
  - type: picture-entity
    title: Mower Camera
    entity: camera.mower
    camera_view: live
    show_state: false

  # ---- Per-zone schedule + manual mow -------------------------------------
  - type: entities
    title: Lawn 1
    entities:
      - entity: input_select.lawn_1_schedule
        name: Frequency
      - entity: input_datetime.lawn_1_next_time
        name: Next mow
      - entity: sensor.lawn_1_days_since_mow
        name: Days since mow
      - type: button
        name: Mow Lawn 1 now
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_lawn_1

  - type: entities
    title: Lawn 2
    entities:
      - entity: input_select.lawn_2_schedule
        name: Frequency
      - entity: input_datetime.lawn_2_next_time
        name: Next mow
      - entity: sensor.lawn_2_days_since_mow
        name: Days since mow
      - type: button
        name: Mow Lawn 2 now
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_lawn_2

  - type: entities
    title: Lawn 3
    entities:
      - entity: input_select.lawn_3_schedule
        name: Frequency
      - entity: input_datetime.lawn_3_next_time
        name: Next mow
      - entity: sensor.lawn_3_days_since_mow
        name: Days since mow
      - type: button
        name: Mow Lawn 3 now
        icon: mdi:robot-mower
        tap_action:
          action: perform-action
          perform_action: script.mow_lawn_3
