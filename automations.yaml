# Scheduler + rain/night automations.
# Add under   automation: !include automations.yaml   in configuration.yaml
#
# One scheduler per zone (Lawn 1/2/3) plus four shared rain/night automations.
# The schedulers fire at each zone's <lawn>_next_time and run the mow if:
#   - mowing automation is enabled,
#   - the zone's schedule isn't "never",
#   - the global do_not_mow flag is off (rain/night), and
#   - the mower isn't already mowing/returning.
# Otherwise the next_time is pushed forward an hour (jumping past dusk at night),
# so a blocked zone retries automatically.

# ===========================================================================
# Per-zone schedulers
# ===========================================================================

- id: lawn_1_scheduler
  alias: Lawn 1 Scheduler
  trigger:
    - platform: time
      at: input_datetime.lawn_1_next_time
  condition:
    - condition: state
      entity_id: input_boolean.mowing_automation_enabled
      state: "on"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_select.lawn_1_schedule', 'never')
                   and is_state('input_boolean.do_not_mow', 'off')
                   and states('lawn_mower.mower') not in ['mowing', 'returning'] }}
          sequence:
            - action: script.mow_lawn_1
      default:
        - action: input_datetime.set_datetime
          target: { entity_id: input_datetime.lawn_1_next_time }
          data:
            datetime: >
              {% set t = now() + timedelta(hours=1) %}
              {% set sunset = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
              {% set sunrise = as_timestamp(state_attr('sun.sun', 'next_rising')) %}
              {% if t.timestamp() >= (sunset - 7200) %}
                {{ (sunrise + 7200) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
              {% else %}
                {{ t.strftime('%Y-%m-%d %H:%M:%S') }}
              {% endif %}
  mode: single

