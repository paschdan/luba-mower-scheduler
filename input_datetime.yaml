# Per-zone scheduling state.
# Add under   input_datetime: !include input_datetime.yaml   in configuration.yaml
#
# For each lawn:
#   <lawn>_next_time      = when the scheduler will next try to mow this zone
#   <lawn>_last_mow_1/2/3 = rolling history of the last three mows (1 = most recent)

# Lawn 1
lawn_1_next_time:
  name: Lawn 1 Next Mow
  has_date: true
  has_time: true
lawn_1_last_mow_1:
  name: Lawn 1 Last Mow 1
  has_date: true
  has_time: true
lawn_1_last_mow_2:
  name: Lawn 1 Last Mow 2
  has_date: true
  has_time: true
lawn_1_last_mow_3:
  name: Lawn 1 Last Mow 3
  has_date: true
  has_time: true

# Lawn 2
lawn_2_next_time:
  name: Lawn 2 Next Mow
  has_date: true
  has_time: true
lawn_2_last_mow_1:
  name: Lawn 2 Last Mow 1
  has_date: true
  has_time: true
lawn_2_last_mow_2:
  name: Lawn 2 Last Mow 2
  has_date: true
  has_time: true
lawn_2_last_mow_3:
  name: Lawn 2 Last Mow 3
  has_date: true
  has_time: true

# Lawn 3
lawn_3_next_time:
  name: Lawn 3 Next Mow
  has_date: true
  has_time: true
lawn_3_last_mow_1:
  name: Lawn 3 Last Mow 1
  has_date: true
  has_time: true
lawn_3_last_mow_2:
  name: Lawn 3 Last Mow 2
  has_date: true
  has_time: true
lawn_3_last_mow_3:
  name: Lawn 3 Last Mow 3
  has_date: true
  has_time: true
