# Template sensors.
# Add under   template: !include template.yaml   in configuration.yaml
# (This file is a LIST, matching the modern `template:` integration format.)

# "Days since last mow" per zone, derived from the <lawn>_last_mow_1 helper.
- sensor:
    - name: "Lawn 1 Days Since Mow"
      unique_id: lawn_1_days_since_mow
      unit_of_measurement: "d"
      icon: mdi:calendar-check
      state: >
        {% set ts = state_attr('input_datetime.lawn_1_last_mow_1', 'timestamp') %}
        {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

    - name: "Lawn 2 Days Since Mow"
      unique_id: lawn_2_days_since_mow
      unit_of_measurement: "d"
      icon: mdi:calendar-check
      state: >
        {% set ts = state_attr('input_datetime.lawn_2_last_mow_1', 'timestamp') %}
        {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

    - name: "Lawn 3 Days Since Mow"
      unique_id: lawn_3_days_since_mow
      unit_of_measurement: "d"
      icon: mdi:calendar-check
      state: >
        {% set ts = state_attr('input_datetime.lawn_3_last_mow_1', 'timestamp') %}
        {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

# ---------------------------------------------------------------------------
# OPTIONAL rain sensors used by the rain-delay automations.
# The automations reference  sensor.rain_today  (mm) and  sensor.rain_probability  (%).
# If these don't exist the rain-delay simply never triggers (the automations use
# | float(0), so a missing sensor reads as 0). To enable rain delay, point the two
# templates below at your own weather integration and uncomment.
#
# Example using the core OpenWeatherMap integration (rename to match your entities):
#
# - sensor:
#     - name: "Rain Today"
#       unique_id: rain_today
#       unit_of_measurement: "mm"
#       state: "{{ states('sensor.openweathermap_forecast_precipitation') | float(0) }}"
#     - name: "Rain Probability"
#       unique_id: rain_probability
#       unit_of_measurement: "%"
#       state: "{{ states('sensor.openweathermap_forecast_precipitation_probability') | float(0) }}"
