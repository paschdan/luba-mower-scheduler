# =============================================================================
# Luba Mower Smart Scheduler — Home Assistant package  (paschdan live install)
# =============================================================================
# Personal branch of paschdan/luba-mower-scheduler, refactored to use
# nielsfaber/scheduler-component for scheduling.
#
# ARCHITECTURE
# ------------
# scheduler-component schedules toggle a per-zone eligibility helper
# on/off across a mowing window (e.g. 11:00-18:00). An orchestrator
# automation (try_mow_when_window_open) watches the helper + rain signals
# and calls the mowing scripts at the right moment. This gives us proper
# "retry when rain clears" behavior instead of a fire-and-forget single-shot.
#
# Wired entities in this HA instance:
#   Mower       : lawn_mower.yuka_mnu7nps5  (Mammotion Yuka)
#   Zone 1      : "Garten"  -> button.garten_yuka_mnu7nps5_aufgabe_1
#   Zone 2      : "Seite"   -> button.garten_yuka_mnu7nps5_aufgabe_3
#   Rain source : weather.forecast_home (Met.no) via a trigger-based template
#                 that polls weather.get_forecasts (hourly) every 15 min.
#   Battery     : sensor.yuka_mnu7nps5_battery
#   GPS         : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   Camera      : camera.yuka_mnu7nps5_none
#
# =============================================================================
# WINDOW-BASED SCHEDULING (event-driven, retries on rain-clear)
# =============================================================================
# Each zone has an "eligibility window" helper (STORAGE-MODE, not defined
# in this YAML — created via UI/API):
#
#   input_boolean.garten_mow_window
#   input_boolean.seite_mow_window
#
# scheduler-component schedules control these helpers, not the scripts:
#
#   Garten  Mon/Wed/Fri  11:00->on  18:00->off
#   Seite   Tue/Thu/Sat  11:00->on  18:00->off
#
# The try_mow_when_window_open automation triggers on:
#   - window helper transitions off -> on   (schedule opened the window)
#   - do_not_mow          transitions on -> off (rain just cleared)
#
# It checks all guards (mowing enabled, do_not_mow off, mower idle, before
# sunset-3h) AND per zone whether it hasn't already mowed today. Then it
# calls the wrapper script for each eligible zone.
#
# If it rains at 11:00 (window opens, do_not_mow is on -> script guards
# block), and rain stops at 14:00 (do_not_mow flips off -> automation
# triggers -> script runs), the zone still gets its mow the same day.
# If nothing works by 18:00 (window closes) or sunset-3h (cutoff), the
# day is skipped and the next scheduled day tries again.
#
# =============================================================================
# RAIN & DAMP-GRASS HEURISTIC
# =============================================================================
# Six signals gate mowing. Mowing is blocked (do_not_mow turns ON) when
# ANY of these is true:
#
#   sensor.rain_today        > 3 mm     forecast for today (whole-day sum)
#   sensor.rain_probability  > 50 %     fraction of today's forecast hours
#                                       with any predicted precipitation
#   sensor.rain_current_hour > 0.5 mm   forecast for the current hour
#   sensor.rain_last_3h      > 5 mm     rolling-sum, grass likely damp
#   sensor.rain_last_6h      > 25 mm    rolling-sum, heavy rain earlier today
#   weather.forecast_home in {rainy, pouring, lightning-rainy, lightning,
#                             hail, snowy, snowy-rainy}
#
# The 3h/6h rolling sums are the "damp grass" fix: even after rain stops,
# the grass stays wet for a while. Approach inspired by simon42.com's Luba-2
# automation, adjusted for Met.no's hourly forecast shape.
# =============================================================================


# -----------------------------------------------------------------------------
# HELPERS: on/off gates
# -----------------------------------------------------------------------------
input_boolean:
  mowing_automation_enabled:
    name: Mowing Automation Enabled
    icon: mdi:robot-mower

  do_not_mow:
    name: Do Not Mow
    icon: mdi:robot-mower-off
    # Auto-managed by rain/night automations. Turn on manually to pause mowing.
    # This is an INTERLOCK (on = blocked). Read: "off = green light".

  block_night_mowing:
    name: Block Night Mowing
    icon: mdi:weather-night


# -----------------------------------------------------------------------------
# HELPERS: per-zone rolling mow-history
#   <zone>_last_mow_1/2/3 = rolling history of the last three mows (1 = newest)
# -----------------------------------------------------------------------------
input_datetime:
  garten_last_mow_1: { name: Garten Last Mow 1, has_date: true, has_time: true }
  garten_last_mow_2: { name: Garten Last Mow 2, has_date: true, has_time: true }
  garten_last_mow_3: { name: Garten Last Mow 3, has_date: true, has_time: true }
  seite_last_mow_1:  { name: Seite Last Mow 1,  has_date: true, has_time: true }
  seite_last_mow_2:  { name: Seite Last Mow 2,  has_date: true, has_time: true }
  seite_last_mow_3:  { name: Seite Last Mow 3,  has_date: true, has_time: true }


# -----------------------------------------------------------------------------
# HELPERS: dashboard-facing text
# -----------------------------------------------------------------------------
input_text:
  reason_no_mow:
    name: Reason No Mow
    initial: ""
    max: 100

  last_lawn_mowed:
    name: Last Lawn Mowed
    initial: ""
    max: 100


# -----------------------------------------------------------------------------
# TEMPLATE SENSORS
# -----------------------------------------------------------------------------
template:
  # --- Per-zone days-since-mow ------------------------------------------------
  - sensor:
      - name: "Garten Days Since Mow"
        unique_id: garten_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.garten_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

      - name: "Seite Days Since Mow"
        unique_id: seite_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.seite_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

  # --- Rain forecast (Met.no via weather.forecast_home) -----------------------
  # Refreshes every 15 minutes and at HA start; calls weather.get_forecasts
  # and derives three sensors. rain_current_hour also feeds the 3h/6h
  # rolling statistics sensors (see the top-level `sensor:` block below).
  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: fc
    sensor:
      - name: "Rain Today"
        unique_id: rain_today
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {{ (slots | map(attribute='precipitation') | map('float', 0) | sum) | round(2) }}

      - name: "Rain Probability"
        unique_id: rain_probability
        unit_of_measurement: "%"
        icon: mdi:weather-pouring
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {% set wet = slots
               | selectattr('precipitation', '>', 0)
               | list | count %}
            {{ ((wet / (slots | count)) * 100) | round(0) | int }}
          {% endif %}

      - name: "Rain Current Hour"
        unique_id: rain_current_hour
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state_class: measurement  # required for the statistics platform below
        state: >
          {% set slots = fc['weather.forecast_home'].forecast %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {{ (slots[0].precipitation | float(0)) | round(2) }}
          {% endif %}


# -----------------------------------------------------------------------------
# LEGACY-PLATFORM SENSORS: rolling-window rain statistics
#
# HA's built-in statistics platform. Adding or changing these requires a
# full HA restart (they don't hot-reload).
# -----------------------------------------------------------------------------
sensor:
  - platform: statistics
    name: "Rain Last 3h"
    unique_id: rain_last_3h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 20
    max_age:
      hours: 3

  - platform: statistics
    name: "Rain Last 6h"
    unique_id: rain_last_6h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 40
    max_age:
      hours: 6


# -----------------------------------------------------------------------------
# SCRIPTS
# -----------------------------------------------------------------------------
script:
  mow_lawn:
    alias: Mow Lawn (parameterized)
    icon: mdi:robot-mower
    mode: parallel
    max: 5
    fields:
      zone_slug:
        description: "Zone slug used to derive helper entity ids (garten, seite, ...)"
        example: "garten"
        selector:
          text:
      zone_button:
        description: "Saved-task button entity_id for this zone"
        example: "button.garten_yuka_mnu7nps5_aufgabe_1"
        selector:
          entity:
            domain: button
      zone_label:
        description: "Human-readable label for dashboards / notifications"
        example: "Garten"
        selector:
          text:
    sequence:
      # ============================================================
      # UP-FRONT GUARDS
      # ============================================================
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.do_not_mow
        state: "off"
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: mowing
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: returning

      # ============================================================
      # Per-zone entity-id bindings (derived from zone_slug field)
      # ============================================================
      - variables:
          e_last_1: "input_datetime.{{ zone_slug }}_last_mow_1"
          e_last_2: "input_datetime.{{ zone_slug }}_last_mow_2"
          e_last_3: "input_datetime.{{ zone_slug }}_last_mow_3"

      # Roll last-mow history (3 <- 2, 2 <- 1, 1 <- now).
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_3 }}"
        data:
          datetime: "{{ states(e_last_2) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_2 }}"
        data:
          datetime: "{{ states(e_last_1) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_1 }}"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Record which lawn just started.
      - action: input_text.set_value
        target:
          entity_id: input_text.last_lawn_mowed
        data:
          value: "{{ zone_label }}"

      # Fire the saved-task button.
      - action: button.press
        target:
          entity_id: "{{ zone_button }}"

  # Per-zone wrappers so schedules can pick a no-argument script.
  mow_garten:
    alias: Mow Garten
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: garten
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_1
          zone_label: Garten

  mow_seite:
    alias: Mow Seite
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: seite
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_3
          zone_label: Seite


# -----------------------------------------------------------------------------
# AUTOMATIONS
# -----------------------------------------------------------------------------
automation:
  # ---------------------------------------------------------------------------
  # Rain / damp grass — block mowing.
  # ---------------------------------------------------------------------------
  - id: do_not_mow_if_rain
    alias: Do Not Mow if Rain
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition:
      - condition: or
        conditions:
          - condition: template
            value_template: >
              {{ states('sensor.rain_today') | float(0) > 3 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_probability') | float(0) > 50 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_current_hour') | float(0) > 0.5 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_last_3h') | float(0) > 5 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_last_6h') | float(0) > 25 }}
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: >
            {% set c = states('weather.forecast_home') %}
            {% set now_h = states('sensor.rain_current_hour') | float(0) %}
            {% set l3 = states('sensor.rain_last_3h') | float(0) %}
            {% set l6 = states('sensor.rain_last_6h') | float(0) %}
            {% set td = states('sensor.rain_today') | float(0) %}
            {% set pb = states('sensor.rain_probability') | float(0) %}
            {% if c in ['rainy','pouring','lightning-rainy','lightning','hail','snowy','snowy-rainy'] %}raining ({{ c }})
            {% elif now_h > 0.5 %}raining now ({{ now_h }}mm/h)
            {% elif l3 > 5 %}wet grass ({{ l3 }}mm last 3h)
            {% elif l6 > 25 %}wet grass ({{ l6 }}mm last 6h)
            {% elif td > 3 %}rain today ({{ td }}mm forecast)
            {% else %}rain soon ({{ pb }}%)
            {% endif %}

  # ---------------------------------------------------------------------------
  # Reset do_not_mow when ALL rain signals dry (mid-day only).
  # ---------------------------------------------------------------------------
  - id: reset_do_not_mow_if_dry
    alias: Reset Do Not Mow if Dry
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition:
      - condition: sun
        after: sunrise
        after_offset: "01:00:00"
        before: sunset
        before_offset: "-01:00:00"
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50
             and states('sensor.rain_current_hour') | float(0) <= 0.5
             and states('sensor.rain_last_3h') | float(0) <= 5
             and states('sensor.rain_last_6h') | float(0) <= 25 }}
      - condition: not
        conditions:
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow

  # ---------------------------------------------------------------------------
  # Night block.
  # ---------------------------------------------------------------------------
  - id: block_mowing_at_night
    alias: Block Mowing at Night
    mode: single
    trigger:
      - platform: sun
        event: sunset
        offset: "-01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: night time

  # ---------------------------------------------------------------------------
  # Clear at sunrise (only if grass is also dry).
  # ---------------------------------------------------------------------------
  - id: allow_mowing_at_sunrise
    alias: Allow Mowing at Sunrise
    mode: single
    trigger:
      - platform: sun
        event: sunrise
        offset: "01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50
             and states('sensor.rain_current_hour') | float(0) <= 0.5
             and states('sensor.rain_last_3h') | float(0) <= 5
             and states('sensor.rain_last_6h') | float(0) <= 25 }}
      - condition: not
        conditions:
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow

  # ---------------------------------------------------------------------------
  # Orchestrator: try to mow when the eligibility window is open.
  # ---------------------------------------------------------------------------
  - id: try_mow_when_window_open
    alias: Try Mow When Window Open
    mode: parallel
    max: 5
    trigger:
      # Window opens (schedule fired at start of eligibility window).
      - platform: state
        entity_id: input_boolean.garten_mow_window
        from: "off"
        to: "on"
        id: garten_window
      - platform: state
        entity_id: input_boolean.seite_mow_window
        from: "off"
        to: "on"
        id: seite_window
      # Rain clears (mid-window retry).
      - platform: state
        entity_id: input_boolean.do_not_mow
        from: "on"
        to: "off"
        id: dry
    condition:
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.do_not_mow
        state: "off"
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: mowing
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: returning
      # Sunset cutoff: don't start after sunset - 3h.
      - condition: sun
        before: sunset
        before_offset: "-03:00:00"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.garten_mow_window
                state: "on"
              - condition: template
                value_template: >
                  {% set ts = state_attr('input_datetime.garten_last_mow_1', 'timestamp') %}
                  {{ ts is none
                     or (ts | as_datetime | as_local).date() != now().date() }}
            sequence:
              - action: script.mow_garten
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.seite_mow_window
                state: "on"
              - condition: template
                value_template: >
                  {% set ts = state_attr('input_datetime.seite_last_mow_1', 'timestamp') %}
                  {{ ts is none
                     or (ts | as_datetime | as_local).date() != now().date() }}
            sequence:
              - action: script.mow_seite
