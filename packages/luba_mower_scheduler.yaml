# =============================================================================
# Luba Mower Smart Scheduler — Home Assistant package  (paschdan live install)
# =============================================================================
# Personal branch of paschdan/luba-mower-scheduler, refactored to a SINGLE
# alternating-dispatch automation. No more scheduler-component schedules,
# no more per-zone eligibility windows. One `mower_dispatch` automation
# does everything: rain check, mower-idle check, sunset cutoff, and picks
# which zone to mow next based on strict A/B alternation.
#
# Wired entities in this HA instance:
#   Mower       : lawn_mower.yuka_mnu7nps5  (Mammotion Yuka)
#   Zone 1      : "Garten"  -> button.garten_yuka_mnu7nps5_aufgabe_1
#   Zone 2      : "Seite"   -> button.garten_yuka_mnu7nps5_aufgabe_3
#   Rain source : weather.forecast_home (Met.no) via a trigger-based template
#                 that polls weather.get_forecasts (hourly) every 15 min.
#   Battery     : sensor.yuka_mnu7nps5_battery
#   GPS         : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   Camera      : camera.yuka_mnu7nps5_none
#
# =============================================================================
# DISPATCH LOGIC (single automation)
# =============================================================================
# input_select.next_zone_to_mow tracks whose turn it is (garten or seite).
# After each successful mow, the automation flips the select to the OTHER
# zone. Strict A/B alternation regardless of weekday.
#
# The mower_dispatch automation fires:
#   - Daily at 11:00                     (main attempt)
#   - When do_not_mow goes on -> off     (retry when rain clears)
#
# Guards (all must pass):
#   - input_boolean.mowing_automation_enabled = on
#   - input_boolean.do_not_mow             = off
#   - lawn_mower.yuka_mnu7nps5 NOT in [mowing, returning, unavailable, unknown]
#   - Before sunset - 3h
#   - Target zone hasn't mowed today
#   - Target zone hasn't mowed in the last 2 days (spacing guard)
#
# If all guards pass, the automation calls the wrapper script for the zone
# named in next_zone_to_mow, waits briefly, then flips the select. If any
# guard fails, nothing happens and the next trigger (rain-clears or
# tomorrow's 11:00) tries again.
#
# =============================================================================
# RAIN & DAMP-GRASS HEURISTIC
# =============================================================================
# Six signals gate mowing. Mowing is blocked (do_not_mow turns ON) when
# ANY of these is true:
#
#   sensor.rain_today        > 3 mm     forecast for today (whole-day sum)
#   sensor.rain_probability  > 50 %     fraction of today's forecast hours
#                                       with any predicted precipitation
#   sensor.rain_current_hour > 0.5 mm   forecast for the current hour
#   sensor.rain_last_3h      > 5 mm     rolling-sum, grass likely damp
#   sensor.rain_last_6h      > 25 mm    rolling-sum, heavy rain earlier today
#   weather.forecast_home in {rainy, pouring, lightning-rainy, lightning,
#                             hail, snowy, snowy-rainy}
#
# The 3h/6h rolling sums are the "damp grass" fix: even after rain stops,
# the grass stays wet for a while. Approach inspired by simon42.com's Luba-2
# automation, adjusted for Met.no's hourly forecast shape.
# =============================================================================


# -----------------------------------------------------------------------------
# HELPERS: on/off gates
# -----------------------------------------------------------------------------
input_boolean:
  mowing_automation_enabled:
    name: Mowing Automation Enabled
    icon: mdi:robot-mower

  do_not_mow:
    name: Do Not Mow
    icon: mdi:robot-mower-off
    # Auto-managed by rain/night automations. Turn on manually to pause mowing.
    # This is an INTERLOCK (on = blocked). Read: "off = green light".

  block_night_mowing:
    name: Block Night Mowing
    icon: mdi:weather-night


# -----------------------------------------------------------------------------
# HELPERS: alternation state
# -----------------------------------------------------------------------------
input_select:
  next_zone_to_mow:
    name: Next Zone to Mow
    icon: mdi:swap-horizontal
    options:
      - garten
      - seite
    initial: seite


# -----------------------------------------------------------------------------
# HELPERS: per-zone rolling mow-history
#   <zone>_last_mow_1/2/3 = rolling history of the last three mows (1 = newest)
# -----------------------------------------------------------------------------
input_datetime:
  garten_last_mow_1: { name: Garten Last Mow 1, has_date: true, has_time: true }
  garten_last_mow_2: { name: Garten Last Mow 2, has_date: true, has_time: true }
  garten_last_mow_3: { name: Garten Last Mow 3, has_date: true, has_time: true }
  seite_last_mow_1:  { name: Seite Last Mow 1,  has_date: true, has_time: true }
  seite_last_mow_2:  { name: Seite Last Mow 2,  has_date: true, has_time: true }
  seite_last_mow_3:  { name: Seite Last Mow 3,  has_date: true, has_time: true }


# -----------------------------------------------------------------------------
# HELPERS: dashboard-facing text
# -----------------------------------------------------------------------------
input_text:
  reason_no_mow:
    name: Reason No Mow
    initial: ""
    max: 100

  last_lawn_mowed:
    name: Last Lawn Mowed
    initial: ""
    max: 100


# -----------------------------------------------------------------------------
# TEMPLATE SENSORS
# -----------------------------------------------------------------------------
template:
  # --- Per-zone days-since-mow ------------------------------------------------
  - sensor:
      - name: "Garten Days Since Mow"
        unique_id: garten_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.garten_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

      - name: "Seite Days Since Mow"
        unique_id: seite_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.seite_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

  # --- Rain forecast (Met.no via weather.forecast_home) -----------------------
  # Refreshes every 15 minutes and at HA start; calls weather.get_forecasts
  # and derives three sensors. rain_current_hour also feeds the 3h/6h
  # rolling statistics sensors (see the top-level `sensor:` block below).
  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: fc
    sensor:
      - name: "Rain Today"
        unique_id: rain_today
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {{ (slots | map(attribute='precipitation') | map('float', 0) | sum) | round(2) }}

      - name: "Rain Probability"
        unique_id: rain_probability
        unit_of_measurement: "%"
        icon: mdi:weather-pouring
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {% set wet = slots
               | selectattr('precipitation', '>', 0)
               | list | count %}
            {{ ((wet / (slots | count)) * 100) | round(0) | int }}
          {% endif %}

      - name: "Rain Current Hour"
        unique_id: rain_current_hour
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state_class: measurement
        state: >
          {% set slots = fc['weather.forecast_home'].forecast %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {{ (slots[0].precipitation | float(0)) | round(2) }}
          {% endif %}


# -----------------------------------------------------------------------------
# LEGACY-PLATFORM SENSORS: rolling-window rain statistics
#
# HA's built-in statistics platform. Adding or changing these requires a
# full HA restart (they don't hot-reload).
# -----------------------------------------------------------------------------
sensor:
  - platform: statistics
    name: "Rain Last 3h"
    unique_id: rain_last_3h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 20
    max_age:
      hours: 3

  - platform: statistics
    name: "Rain Last 6h"
    unique_id: rain_last_6h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 40
    max_age:
      hours: 6


# -----------------------------------------------------------------------------
# SCRIPTS
# -----------------------------------------------------------------------------
script:
  mow_lawn:
    alias: Mow Lawn (parameterized)
    icon: mdi:robot-mower
    mode: parallel
    max: 5
    fields:
      zone_slug:
        description: "Zone slug used to derive helper entity ids (garten, seite, ...)"
        example: "garten"
        selector:
          text:
      zone_button:
        description: "Saved-task button entity_id for this zone"
        example: "button.garten_yuka_mnu7nps5_aufgabe_1"
        selector:
          entity:
            domain: button
      zone_label:
        description: "Human-readable label for dashboards / notifications"
        example: "Garten"
        selector:
          text:
    sequence:
      # ============================================================
      # UP-FRONT GUARDS (redundant safety net; mower_dispatch checks
      # the same conditions upstream, but the script is also called
      # from the dashboard 'jetzt mähen' buttons which bypass those.)
      # ============================================================
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.do_not_mow
        state: "off"
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state:
              - mowing
              - returning
              - unavailable
              - unknown

      # ============================================================
      # Per-zone entity-id bindings (derived from zone_slug field)
      # ============================================================
      - variables:
          e_last_1: "input_datetime.{{ zone_slug }}_last_mow_1"
          e_last_2: "input_datetime.{{ zone_slug }}_last_mow_2"
          e_last_3: "input_datetime.{{ zone_slug }}_last_mow_3"

      # Roll last-mow history (3 <- 2, 2 <- 1, 1 <- now).
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_3 }}"
        data:
          datetime: "{{ states(e_last_2) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_2 }}"
        data:
          datetime: "{{ states(e_last_1) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_1 }}"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Record which lawn just started.
      - action: input_text.set_value
        target:
          entity_id: input_text.last_lawn_mowed
        data:
          value: "{{ zone_label }}"

      # Fire the saved-task button.
      - action: button.press
        target:
          entity_id: "{{ zone_button }}"

  # Per-zone wrappers so the dashboard buttons can call a no-argument script.
  mow_garten:
    alias: Mow Garten
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: garten
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_1
          zone_label: Garten

  mow_seite:
    alias: Mow Seite
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: seite
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_3
          zone_label: Seite


# -----------------------------------------------------------------------------
# AUTOMATIONS
# -----------------------------------------------------------------------------
automation:
  # ---------------------------------------------------------------------------
  # Rain / damp grass — block mowing.
  # ---------------------------------------------------------------------------
  - id: do_not_mow_if_rain
    alias: Do Not Mow if Rain
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition:
      - condition: or
        conditions:
          - condition: template
            value_template: >
              {{ states('sensor.rain_today') | float(0) > 3 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_probability') | float(0) > 50 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_current_hour') | float(0) > 0.5 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_last_3h') | float(0) > 5 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_last_6h') | float(0) > 25 }}
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: >
            {% set c = states('weather.forecast_home') %}
            {% set now_h = states('sensor.rain_current_hour') | float(0) %}
            {% set l3 = states('sensor.rain_last_3h') | float(0) %}
            {% set l6 = states('sensor.rain_last_6h') | float(0) %}
            {% set td = states('sensor.rain_today') | float(0) %}
            {% set pb = states('sensor.rain_probability') | float(0) %}
            {% if c in ['rainy','pouring','lightning-rainy','lightning','hail','snowy','snowy-rainy'] %}raining ({{ c }})
            {% elif now_h > 0.5 %}raining now ({{ now_h }}mm/h)
            {% elif l3 > 5 %}wet grass ({{ l3 }}mm last 3h)
            {% elif l6 > 25 %}wet grass ({{ l6 }}mm last 6h)
            {% elif td > 3 %}rain today ({{ td }}mm forecast)
            {% else %}rain soon ({{ pb }}%)
            {% endif %}

  # ---------------------------------------------------------------------------
  # Reset do_not_mow when ALL rain signals dry (mid-day only).
  # ---------------------------------------------------------------------------
  - id: reset_do_not_mow_if_dry
    alias: Reset Do Not Mow if Dry
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition:
      - condition: sun
        after: sunrise
        after_offset: "01:00:00"
        before: sunset
        before_offset: "-01:00:00"
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50
             and states('sensor.rain_current_hour') | float(0) <= 0.5
             and states('sensor.rain_last_3h') | float(0) <= 5
             and states('sensor.rain_last_6h') | float(0) <= 25 }}
      - condition: not
        conditions:
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow

  # ---------------------------------------------------------------------------
  # Night block.
  # ---------------------------------------------------------------------------
  - id: block_mowing_at_night
    alias: Block Mowing at Night
    mode: single
    trigger:
      - platform: sun
        event: sunset
        offset: "-01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: night time

  # ---------------------------------------------------------------------------
  # Clear at sunrise (only if grass is also dry).
  # ---------------------------------------------------------------------------
  - id: allow_mowing_at_sunrise
    alias: Allow Mowing at Sunrise
    mode: single
    trigger:
      - platform: sun
        event: sunrise
        offset: "01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50
             and states('sensor.rain_current_hour') | float(0) <= 0.5
             and states('sensor.rain_last_3h') | float(0) <= 5
             and states('sensor.rain_last_6h') | float(0) <= 25 }}
      - condition: not
        conditions:
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow

  # ---------------------------------------------------------------------------
  # DISPATCHER — the single mowing brain.
  #
  # Fires daily at 11:00 AND when do_not_mow clears (rain stopped).
  # Picks the zone named in input_select.next_zone_to_mow, verifies:
  #   - all up-front guards (automation on, do_not_mow off, mower idle,
  #     before sunset - 3h),
  #   - target zone hasn't mowed today,
  #   - target zone hasn't mowed in the last 2 days (min spacing),
  # then runs the wrapper script and flips next_zone_to_mow to the OTHER
  # zone so the next dispatch alternates.
  #
  # If a guard fails, nothing happens and the next dispatch trigger tries
  # again with the same target zone (no flip on failure).
  # ---------------------------------------------------------------------------
  - id: mower_dispatch
    alias: Mower Dispatch
    mode: single
    trigger:
      - platform: time
        at: "11:00:00"
        id: daily
      - platform: state
        entity_id: input_boolean.do_not_mow
        from: "on"
        to: "off"
        id: dry
    condition:
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.do_not_mow
        state: "off"
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state:
              - mowing
              - returning
              - unavailable
              - unknown
      - condition: sun
        before: sunset
        before_offset: "-03:00:00"
    action:
      - variables:
          next_zone: "{{ states('input_select.next_zone_to_mow') }}"
          last_mow_ts: "{{ state_attr('input_datetime.' ~ next_zone ~ '_last_mow_1', 'timestamp') }}"
          today: "{{ now().date() }}"
          last_mow_date: >
            {{ (last_mow_ts | as_datetime | as_local).date() if last_mow_ts else none }}
          days_since_last: >
            {{ ((now().timestamp() - last_mow_ts) / 86400) if last_mow_ts else 999 }}
          # Guard: not mowed today
          not_mowed_today: >
            {{ last_mow_date is none or last_mow_date != today }}
          # Guard: at least 2 days since same zone last mowed
          # (protects against rain-clears twice in one day, and against
          # mow-manually-then-schedule-fires-shortly-after.)
          spacing_ok: >
            {{ days_since_last | float(999) >= 2.0 }}
          other_zone: "{{ 'seite' if next_zone == 'garten' else 'garten' }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not_mowed_today and spacing_ok }}"
            sequence:
              # Run the wrapper for the target zone.
              - action: "script.mow_{{ next_zone }}"
              # Give the script a moment to flip lawn_mower state, then
              # flip the select to the other zone so next dispatch alternates.
              - delay:
                  seconds: 5
              - action: input_select.select_option
                target:
                  entity_id: input_select.next_zone_to_mow
                data:
                  option: "{{ other_zone }}"
