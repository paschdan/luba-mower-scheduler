# =============================================================================
# Luba Mower Smart Scheduler — Home Assistant package  (paschdan live install)
# =============================================================================
# Personal branch of paschdan/luba-mower-scheduler, pre-wired for the actual
# hardware in this HA instance AND refactored to use nielsfaber/scheduler-component
# for the timing side (in place of a hand-rolled input_datetime/input_select
# scheduler automation).
#
#   - Mower       : lawn_mower.yuka_mnu7nps5  (Mammotion Yuka)
#   - Zone 1      : "Garten"  -> button.garten_yuka_mnu7nps5_aufgabe_1
#   - Zone 2      : "Seite"   -> button.garten_yuka_mnu7nps5_aufgabe_3
#   - Rain source : weather.forecast_home (Met.no) via a trigger-based
#                   template sensor that polls weather.get_forecasts.
#   - Camera      : camera.yuka_mnu7nps5_none
#   - GPS         : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   - Battery     : sensor.yuka_mnu7nps5_battery
#
# The scheduler is compatible with automation.mower_paused_continue
# ("Mower - Smart Restart and Reset"), which handles stuck retries independently.
#
# ARCHITECTURE
# ------------
# The previous per-zone `input_datetime.<zone>_next_time` +
# `input_select.<zone>_schedule` + `automation.luba_mower_scheduler` triple has
# been replaced with **schedules managed by nielsfaber/scheduler-component**.
# Each zone gets its own `switch.schedule_*` entity (created via scheduler.add
# or the scheduler-card UI) whose action calls `script.mow_lawn` with the
# right zone parameters. All the "should I mow right now?" gating
# (mowing_automation_enabled / do_not_mow / mower busy) is now inside
# `script.mow_lawn` itself as up-front conditions — so a scheduled slot that
# fires while it's raining or the mower is docked simply no-ops, and the next
# scheduled slot will re-try naturally.
#
# NO MORE:
#   - input_select.<zone>_schedule   (removed; scheduler-component owns cadence)
#   - input_datetime.<zone>_next_time (removed; scheduler-component owns next-run)
#   - automation.luba_mower_scheduler (removed; scheduler-component fires the script)
#
# STILL HERE (used by script + dashboard):
#   - input_boolean.*                 (automation_enabled / do_not_mow / block_night_mowing)
#   - input_datetime.<zone>_last_mow_1/2/3 (rolling history for days-since-mow sensor)
#   - input_text.reason_no_mow / last_lawn_mowed
#   - sensor.<zone>_days_since_mow
#   - sensor.rain_today / sensor.rain_probability (trigger-based Met.no templates)
#   - 4x rain/night automations (do_not_mow_if_rain, reset_do_not_mow_if_dry,
#     block_mowing_at_night, allow_mowing_at_sunrise)
#   - script.mow_lawn (parameterized; now gated by up-front conditions)
#
# INSTALL
# -------
# 1. In configuration.yaml, ensure packages are enabled once:
#      homeassistant:
#        packages: !include_dir_named packages
# 2. Drop this file into  <config>/packages/luba_mower_scheduler.yaml
#    (or <config>/packages/mower.yaml — filename doesn't matter for HA)
# 3. Install nielsfaber/scheduler-component via HACS (integration) if not
#    already installed. Add the "Scheduler" integration under Settings > Devices
#    & Services.
# 4. Optionally install nielsfaber/scheduler-card via HACS (Lovelace) for a
#    nice UI to edit schedules — dashboard.yaml includes it as
#    `custom:scheduler-card`.
# 5. Restart Home Assistant.
# 6. Create per-zone schedules by either:
#    - Using the scheduler-card UI (recommended) — set weekdays + time,
#      pick script.mow_lawn as the action, and pass the right service_data.
#    - Calling `scheduler.add` from Developer Tools > Actions. Example for
#      "Garten Mon/Wed/Fri 09:00":
#         action: scheduler.add
#         data:
#           name: Garten mähen
#           repeat_type: repeat
#           weekdays: [mon, wed, fri]
#           timeslots:
#             - start: "09:00:00"
#               stop: "09:15:00"
#               actions:
#                 - service: script.mow_lawn
#                   entity_id: script.mow_lawn
#                   service_data:
#                     zone_slug: garten
#                     zone_button: button.garten_yuka_mnu7nps5_aufgabe_1
#                     zone_label: Garten
# 7. Turn on `Mowing Automation Enabled` in the dashboard.
# =============================================================================


# -----------------------------------------------------------------------------
# HELPERS: on/off gates
# -----------------------------------------------------------------------------
input_boolean:
  mowing_automation_enabled:
    name: Mowing Automation Enabled
    icon: mdi:robot-mower

  do_not_mow:
    name: Do Not Mow
    icon: mdi:robot-mower-off
    # Auto-managed by rain/night automations. Turn on manually to pause mowing.

  block_night_mowing:
    name: Block Night Mowing
    icon: mdi:weather-night


# -----------------------------------------------------------------------------
# HELPERS: per-zone rolling mow-history
#   <zone>_last_mow_1/2/3 = rolling history of the last three mows (1 = newest)
# The old <zone>_next_time helpers are GONE — scheduler-component owns "when".
# -----------------------------------------------------------------------------
input_datetime:
  garten_last_mow_1:
    name: Garten Last Mow 1
    has_date: true
    has_time: true
  garten_last_mow_2:
    name: Garten Last Mow 2
    has_date: true
    has_time: true
  garten_last_mow_3:
    name: Garten Last Mow 3
    has_date: true
    has_time: true

  seite_last_mow_1:
    name: Seite Last Mow 1
    has_date: true
    has_time: true
  seite_last_mow_2:
    name: Seite Last Mow 2
    has_date: true
    has_time: true
  seite_last_mow_3:
    name: Seite Last Mow 3
    has_date: true
    has_time: true


# -----------------------------------------------------------------------------
# HELPERS: dashboard-facing text
# -----------------------------------------------------------------------------
input_text:
  reason_no_mow:
    name: Reason No Mow
    initial: ""
    max: 100

  last_lawn_mowed:
    name: Last Lawn Mowed
    initial: ""
    max: 100


# -----------------------------------------------------------------------------
# TEMPLATE SENSORS
#
# 1. Per-zone "days since last mow".
# 2. Rain sensors pulled from weather.forecast_home (Met.no) forecast via a
#    trigger-based template that calls weather.get_forecasts on a schedule.
#    Populates sensor.rain_today (mm total for today) and sensor.rain_probability
#    (% of today's remaining forecast hours with precipitation > 0, since Met.no
#    doesn't expose a native probability field). Matches the "> 3 mm OR > 50%"
#    logic the rain-delay automations expect.
# -----------------------------------------------------------------------------
template:
  # --- Per-zone days-since-mow ------------------------------------------------
  - sensor:
      - name: "Garten Days Since Mow"
        unique_id: garten_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.garten_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

      - name: "Seite Days Since Mow"
        unique_id: seite_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.seite_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

  # --- Rain forecast (Met.no via weather.forecast_home) -----------------------
  # Trigger-based template refreshes every 30 minutes and at HA startup, calls
  # weather.get_forecasts (hourly) on weather.forecast_home, and derives two
  # sensors the rain-delay automations feed on.
  - trigger:
      - platform: time_pattern
        minutes: "/30"
      - platform: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: fc
    sensor:
      - name: "Rain Today"
        unique_id: rain_today
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {{ (slots | map(attribute='precipitation') | map('float', 0) | sum) | round(2) }}

      - name: "Rain Probability"
        unique_id: rain_probability
        unit_of_measurement: "%"
        icon: mdi:weather-pouring
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {% set wet = slots
               | selectattr('precipitation', '>', 0)
               | list | count %}
            {{ ((wet / (slots | count)) * 100) | round(0) | int }}
          {% endif %}


# -----------------------------------------------------------------------------
# SCRIPT: single parameterized mow (called by scheduler-component schedules
# and by the manual "jetzt mähen" dashboard buttons).
#
# All up-front gating (automation enabled? do_not_mow off? mower idle?) is
# HERE, not in a separate scheduler automation. When scheduler-component fires
# this script at a scheduled slot and something's blocking, the conditions
# short-circuit the sequence — no mow, no partial state changes, no manual
# retry logic needed (the next slot re-tries naturally).
# -----------------------------------------------------------------------------
script:
  mow_lawn:
    alias: Mow Lawn (parameterized)
    icon: mdi:robot-mower
    mode: parallel
    max: 5
    fields:
      zone_slug:
        description: "Zone slug used to derive helper entity ids (garten, seite, ...)"
        example: "garten"
        selector:
          text:
      zone_button:
        description: "Saved-task button entity_id for this zone"
        example: "button.garten_yuka_mnu7nps5_aufgabe_1"
        selector:
          entity:
            domain: button
      zone_label:
        description: "Human-readable label for dashboards / notifications"
        example: "Garten"
        selector:
          text:
    sequence:
      # ============================================================
      # UP-FRONT GUARDS
      # scheduler-component fires this script at scheduled times, so
      # we gate everything here (no separate scheduler automation).
      # ============================================================
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.do_not_mow
        state: "off"
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: mowing
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: returning

      # ============================================================
      # Per-zone entity-id bindings (derived from zone_slug field)
      # ============================================================
      - variables:
          e_last_1: "input_datetime.{{ zone_slug }}_last_mow_1"
          e_last_2: "input_datetime.{{ zone_slug }}_last_mow_2"
          e_last_3: "input_datetime.{{ zone_slug }}_last_mow_3"

      # Roll last-mow history (3 <- 2, 2 <- 1, 1 <- now).
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_3 }}"
        data:
          datetime: "{{ states(e_last_2) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_2 }}"
        data:
          datetime: "{{ states(e_last_1) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_1 }}"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Record which lawn just started.
      - action: input_text.set_value
        target:
          entity_id: input_text.last_lawn_mowed
        data:
          value: "{{ zone_label }}"

      # Fire the saved-task button.
      - action: button.press
        target:
          entity_id: "{{ zone_button }}"


# -----------------------------------------------------------------------------
# AUTOMATIONS
#
# The old luba_mower_scheduler automation is GONE — scheduler-component now
# owns the "when to fire script.mow_lawn" role. What remains: the four
# rain/night helpers that manage the do_not_mow flag.
# -----------------------------------------------------------------------------
automation:
  # ---------------------------------------------------------------------------
  # Rain delay (fed by sensor.rain_today + sensor.rain_probability from the
  # Met.no template above).
  # ---------------------------------------------------------------------------
  - id: do_not_mow_if_rain
    alias: Do Not Mow if Rain
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/30"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) > 3
             or states('sensor.rain_probability') | float(0) > 50 }}
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: >
            {% if states('sensor.rain_today') | float(0) > 3 %}wet ground{% else %}rain soon{% endif %}

  - id: reset_do_not_mow_if_dry
    alias: Reset Do Not Mow if Dry
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/30"
    condition:
      # Template (not numeric_state) so a MISSING rain sensor reads as 0/"dry",
      # matching the fallback where "no rain sensors = never triggers rain
      # delay, but also never blocks the auto-clear".
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50 }}
      # Only auto-clear during the day, so the night block below isn't undone.
      - condition: sun
        after: sunrise
        after_offset: "01:00:00"
        before: sunset
        before_offset: "-01:00:00"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow

  # ---------------------------------------------------------------------------
  # Night block (optional — gated by input_boolean.block_night_mowing).
  # ---------------------------------------------------------------------------
  - id: block_mowing_at_night
    alias: Block Mowing at Night
    mode: single
    trigger:
      - platform: sun
        event: sunset
        offset: "-01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: night time

  - id: allow_mowing_at_sunrise
    alias: Allow Mowing at Sunrise
    mode: single
    trigger:
      - platform: sun
        event: sunrise
        offset: "01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
      # Template (see reset_do_not_mow_if_dry) so a MISSING rain sensor
      # counts as "dry" and doesn't strand do_not_mow.
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50 }}
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow
