# =============================================================================
# Luba Mower Smart Scheduler — Home Assistant package  (paschdan live install)
# =============================================================================
# Personal branch of paschdan/luba-mower-scheduler, pre-wired for the actual
# hardware in this HA instance:
#
#   - Mower       : lawn_mower.yuka_mnu7nps5  (Mammotion Yuka)
#   - Zone 1      : "Garten"  -> button.garten_yuka_mnu7nps5_aufgabe_1
#   - Zone 2      : "Seite"   -> button.garten_yuka_mnu7nps5_aufgabe_3
#   - Rain source : weather.forecast_home (Met.no) via a trigger-based
#                   template sensor that polls weather.get_forecasts.
#   - Camera      : camera.yuka_mnu7nps5_none
#   - GPS         : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   - Battery     : sensor.yuka_mnu7nps5_battery
#
# The scheduler is compatible with automation.mower_paused_continue
# ("Mower - Smart Restart and Reset"), which handles stuck retries independently.
#
# INSTALL
# -------
# 1. In configuration.yaml, ensure packages are enabled once:
#      homeassistant:
#        packages: !include_dir_named packages
# 2. Drop this file into  <config>/packages/luba_mower_scheduler.yaml
# 3. Restart Home Assistant.
# 4. Turn on `Mowing Automation Enabled`, pick a schedule per zone, set each
#    zone's "Next Mow" to a future time. The scheduler fires and reschedules.
#
# WHAT'S IN HERE
# --------------
# - 3 input_boolean, 2 input_select, 8 input_datetime, 2 input_text helpers
# - 2 "days since mow" template sensors + rain template sensors (Met.no)
# - 1 parameterized mow script (mow_lawn) — reused for every zone
# - 1 consolidated scheduler automation (multiple triggers, one code path)
# - 4 rain/night automations
# =============================================================================


# -----------------------------------------------------------------------------
# HELPERS: on/off gates
# -----------------------------------------------------------------------------
input_boolean:
  mowing_automation_enabled:
    name: Mowing Automation Enabled
    icon: mdi:robot-mower

  do_not_mow:
    name: Do Not Mow
    icon: mdi:robot-mower-off
    # Auto-managed by rain/night automations. Turn on manually to pause mowing.

  block_night_mowing:
    name: Block Night Mowing
    icon: mdi:weather-night


# -----------------------------------------------------------------------------
# HELPERS: per-zone frequency
# -----------------------------------------------------------------------------
input_select:
  garten_schedule:
    name: Garten Schedule
    options:
      - never
      - once per week
      - twice per week
    initial: never
    icon: mdi:calendar-clock

  seite_schedule:
    name: Seite Schedule
    options:
      - never
      - once per week
      - twice per week
    initial: never
    icon: mdi:calendar-clock


# -----------------------------------------------------------------------------
# HELPERS: per-zone scheduling state
#   <zone>_next_time      = when the scheduler will next try to mow this zone
#   <zone>_last_mow_1/2/3 = rolling history of the last three mows (1 = newest)
# -----------------------------------------------------------------------------
input_datetime:
  garten_next_time:
    name: Garten Next Mow
    has_date: true
    has_time: true
  garten_last_mow_1:
    name: Garten Last Mow 1
    has_date: true
    has_time: true
  garten_last_mow_2:
    name: Garten Last Mow 2
    has_date: true
    has_time: true
  garten_last_mow_3:
    name: Garten Last Mow 3
    has_date: true
    has_time: true

  seite_next_time:
    name: Seite Next Mow
    has_date: true
    has_time: true
  seite_last_mow_1:
    name: Seite Last Mow 1
    has_date: true
    has_time: true
  seite_last_mow_2:
    name: Seite Last Mow 2
    has_date: true
    has_time: true
  seite_last_mow_3:
    name: Seite Last Mow 3
    has_date: true
    has_time: true


# -----------------------------------------------------------------------------
# HELPERS: dashboard-facing text
# -----------------------------------------------------------------------------
input_text:
  reason_no_mow:
    name: Reason No Mow
    initial: ""
    max: 100

  last_lawn_mowed:
    name: Last Lawn Mowed
    initial: ""
    max: 100


# -----------------------------------------------------------------------------
# TEMPLATE SENSORS
#
# 1. Per-zone "days since last mow".
# 2. Rain sensors pulled from weather.forecast_home (Met.no) forecast via a
#    trigger-based template that calls weather.get_forecasts on a schedule.
#    Populates sensor.rain_today (mm total for today) and sensor.rain_probability
#    (max % across today's forecast slots). Matches the "> 3 mm OR > 50%" logic
#    the scheduler expects.
# -----------------------------------------------------------------------------
template:
  # --- Per-zone days-since-mow ------------------------------------------------
  - sensor:
      - name: "Garten Days Since Mow"
        unique_id: garten_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.garten_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

      - name: "Seite Days Since Mow"
        unique_id: seite_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.seite_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

  # --- Rain forecast (Met.no via weather.forecast_home) -----------------------
  # Trigger-based template that:
  #   - refreshes every 30 minutes and at startup,
  #   - calls weather.get_forecasts (hourly) on weather.forecast_home,
  #   - populates two sensors that mirror the OpenWeatherMap sensor names the
  #     rain-delay automations expect:
  #       * sensor.rain_today       (mm)  = SUM of precipitation across the
  #                                         remaining hours of today
  #       * sensor.rain_probability (%)   = FRACTION of today's remaining
  #                                         hours that have any predicted
  #                                         precipitation, scaled to 0-100.
  #                                         Met.no's hourly forecast doesn't
  #                                         carry a native probability field,
  #                                         so we derive one from
  #                                         "how many hours will it be raining".
  #                                         Empty forecast (late evening) -> 0.
  - trigger:
      - platform: time_pattern
        minutes: "/30"
      - platform: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: fc
    sensor:
      - name: "Rain Today"
        unique_id: rain_today
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {{ (slots | map(attribute='precipitation') | map('float', 0) | sum) | round(2) }}

      - name: "Rain Probability"
        unique_id: rain_probability
        unit_of_measurement: "%"
        icon: mdi:weather-pouring
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {% set wet = slots
               | selectattr('precipitation', '>', 0)
               | list | count %}
            {{ ((wet / (slots | count)) * 100) | round(0) | int }}
          {% endif %}


# -----------------------------------------------------------------------------
# SCRIPT: single parameterized mow (used for every zone)
#
# Presses the saved-task button for the given zone and rolls the history +
# reschedules the next run based on the zone's input_select. The saved-task
# button runs the mowing task you configured in the Mammotion app (cutting
# angle, speed, blade height, edge mode). To retune, edit the task IN THE APP.
# -----------------------------------------------------------------------------
script:
  mow_lawn:
    alias: Mow Lawn (parameterized)
    icon: mdi:robot-mower
    mode: parallel
    max: 5
    fields:
      zone_slug:
        description: "Zone slug used to derive helper entity ids (garten, seite, ...)"
        example: "garten"
        selector:
          text:
      zone_button:
        description: "Saved-task button entity_id for this zone"
        example: "button.garten_yuka_mnu7nps5_aufgabe_1"
        selector:
          entity:
            domain: button
      zone_label:
        description: "Human-readable label for dashboards / notifications"
        example: "Garten"
        selector:
          text:
    sequence:
      # 1. Skip if the mower is already out.
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: mowing
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: returning

      # 2. Bind per-zone entity_ids we'll reuse in the sequence below.
      - variables:
          e_last_1: "input_datetime.{{ zone_slug }}_last_mow_1"
          e_last_2: "input_datetime.{{ zone_slug }}_last_mow_2"
          e_last_3: "input_datetime.{{ zone_slug }}_last_mow_3"
          e_next:  "input_datetime.{{ zone_slug }}_next_time"
          e_sched: "input_select.{{ zone_slug }}_schedule"

      # 3. Roll last-mow history (3 <- 2, 2 <- 1, 1 <- now).
      - action: input_datetime.set_datetime
        target: { entity_id: "{{ e_last_3 }}" }
        data:   { datetime: "{{ states(e_last_2) }}" }
      - action: input_datetime.set_datetime
        target: { entity_id: "{{ e_last_2 }}" }
        data:   { datetime: "{{ states(e_last_1) }}" }
      - action: input_datetime.set_datetime
        target: { entity_id: "{{ e_last_1 }}" }
        data:   { datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}" }

      # 4. Record which lawn just started.
      - action: input_text.set_value
        target: { entity_id: input_text.last_lawn_mowed }
        data:   { value: "{{ zone_label }}" }

      # 5. Fire the saved-task button.
      - action: button.press
        target: { entity_id: "{{ zone_button }}" }

      # 6. Reschedule next run based on the zone's chosen frequency.
      - action: input_datetime.set_datetime
        target: { entity_id: "{{ e_next }}" }
        data:
          datetime: >
            {% set freq = states(e_sched) %}
            {% if freq == 'once per week' %}
              {{ (now() + timedelta(days=7)).strftime('%Y-%m-%d %H:%M:%S') }}
            {% elif freq == 'twice per week' %}
              {{ (now() + timedelta(days=3)).strftime('%Y-%m-%d %H:%M:%S') }}
            {% else %}
              {{ (now() + timedelta(days=365)).strftime('%Y-%m-%d %H:%M:%S') }}
            {% endif %}


# -----------------------------------------------------------------------------
# AUTOMATIONS
#
# 1x consolidated scheduler (all zones)  +  4x rain/night helpers.
# -----------------------------------------------------------------------------
automation:
  # ---------------------------------------------------------------------------
  # Consolidated per-zone scheduler.
  # One code path, one time-trigger per zone keyed by trigger.id. Adding a
  # zone = one more trigger entry + one more variables.zones block.
  # ---------------------------------------------------------------------------
  - id: luba_mower_scheduler
    alias: Luba Mower Scheduler
    mode: parallel
    max: 5
    trigger:
      - platform: time
        at: input_datetime.garten_next_time
        id: garten
      - platform: time
        at: input_datetime.seite_next_time
        id: seite
    condition:
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
    variables:
      zones:
        garten:
          slug: garten
          label: "Garten"
          button: button.garten_yuka_mnu7nps5_aufgabe_1
          schedule: input_select.garten_schedule
          next_time: input_datetime.garten_next_time
        seite:
          slug: seite
          label: "Seite"
          button: button.garten_yuka_mnu7nps5_aufgabe_3
          schedule: input_select.seite_schedule
          next_time: input_datetime.seite_next_time
      z: "{{ zones[trigger.id] }}"
    action:
      - choose:
          # Happy path: nothing blocking, so mow.
          - conditions:
              - condition: state
                entity_id: input_boolean.do_not_mow
                state: "off"
              - condition: template
                value_template: >
                  {{ states(z.schedule) != 'never'
                     and states('lawn_mower.yuka_mnu7nps5') not in ['mowing', 'returning'] }}
            sequence:
              - action: script.mow_lawn
                data:
                  zone_slug:   "{{ z.slug }}"
                  zone_button: "{{ z.button }}"
                  zone_label:  "{{ z.label }}"
        # Blocked path: push next_time forward by 1h; if that lands in the
        # dusk window, jump to 2h past sunrise so we don't try overnight.
        default:
          - action: input_datetime.set_datetime
            target: { entity_id: "{{ z.next_time }}" }
            data:
              datetime: >
                {% set t = now() + timedelta(hours=1) %}
                {% set sunset  = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
                {% set sunrise = as_timestamp(state_attr('sun.sun', 'next_rising')) %}
                {% if t.timestamp() >= (sunset - 7200) %}
                  {{ (sunrise + 7200) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
                {% else %}
                  {{ t.strftime('%Y-%m-%d %H:%M:%S') }}
                {% endif %}

  # ---------------------------------------------------------------------------
  # Rain delay (fed by sensor.rain_today + sensor.rain_probability from the
  # Met.no template above).
  # ---------------------------------------------------------------------------
  - id: do_not_mow_if_rain
    alias: Do Not Mow if Rain
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/30"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) > 3
             or states('sensor.rain_probability') | float(0) > 50 }}
    action:
      - action: input_boolean.turn_on
        target: { entity_id: input_boolean.do_not_mow }
      - action: input_text.set_value
        target: { entity_id: input_text.reason_no_mow }
        data:
          value: >
            {% if states('sensor.rain_today') | float(0) > 3 %}wet ground{% else %}rain soon{% endif %}

  - id: reset_do_not_mow_if_dry
    alias: Reset Do Not Mow if Dry
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/30"
    condition:
      # Template (not numeric_state) so a MISSING rain sensor reads as 0/"dry",
      # matching the fallback where "no rain sensors = never triggers rain
      # delay, but also never blocks the auto-clear".
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50 }}
      # Only auto-clear during the day, so the night block below isn't undone.
      - condition: sun
        after: sunrise
        after_offset: "01:00:00"
        before: sunset
        before_offset: "-01:00:00"
    action:
      - action: input_boolean.turn_off
        target: { entity_id: input_boolean.do_not_mow }

  # ---------------------------------------------------------------------------
  # Night block (optional — gated by input_boolean.block_night_mowing).
  # ---------------------------------------------------------------------------
  - id: block_mowing_at_night
    alias: Block Mowing at Night
    mode: single
    trigger:
      - platform: sun
        event: sunset
        offset: "-01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
    action:
      - action: input_boolean.turn_on
        target: { entity_id: input_boolean.do_not_mow }
      - action: input_text.set_value
        target: { entity_id: input_text.reason_no_mow }
        data: { value: night time }

  - id: allow_mowing_at_sunrise
    alias: Allow Mowing at Sunrise
    mode: single
    trigger:
      - platform: sun
        event: sunrise
        offset: "01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
      # Template (see reset_do_not_mow_if_dry) so a MISSING rain sensor
      # counts as "dry" and doesn't strand do_not_mow.
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50 }}
    action:
      - action: input_boolean.turn_off
        target: { entity_id: input_boolean.do_not_mow }
