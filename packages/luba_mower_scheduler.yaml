# =============================================================================
# Luba Mower Smart Scheduler — Home Assistant package  (paschdan live install)
# =============================================================================
# Personal branch of paschdan/luba-mower-scheduler, refactored to use
# nielsfaber/scheduler-component for scheduling. Timing lives in
# scheduler-component schedules that call per-zone wrapper scripts
# (script.mow_garten / script.mow_seite); the mowing gating (mowing_automation
# / do_not_mow / mower-busy) lives inside script.mow_lawn as up-front conditions.
#
# Wired entities in this HA instance:
#   Mower       : lawn_mower.yuka_mnu7nps5  (Mammotion Yuka)
#   Zone 1      : "Garten"  -> button.garten_yuka_mnu7nps5_aufgabe_1
#   Zone 2      : "Seite"   -> button.garten_yuka_mnu7nps5_aufgabe_3
#   Rain source : weather.forecast_home (Met.no) via a trigger-based template
#                 that polls weather.get_forecasts (hourly) every 15 min.
#   Battery     : sensor.yuka_mnu7nps5_battery
#   GPS         : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   Camera      : camera.yuka_mnu7nps5_none
#
# =============================================================================
# RAIN & DAMP-GRASS HEURISTIC
# =============================================================================
# The rain-delay logic checks SIX signals. Mowing is blocked when ANY of these
# is true:
#
#   sensor.rain_today        > 3 mm     forecast for today (whole-day sum)
#   sensor.rain_probability  > 50 %     fraction of today's forecast hours
#                                       with any predicted precipitation
#   sensor.rain_current_hour > 0.5 mm   forecast for the current hour
#   sensor.rain_last_3h      > 5 mm     rolling-sum, grass likely damp
#   sensor.rain_last_6h      > 25 mm    rolling-sum, heavy rain earlier today
#   weather.forecast_home in {rainy, pouring, lightning-rainy, lightning,
#                             hail, snowy, snowy-rainy}
#
# The 3h/6h rolling sums are the "damp grass" fix: even after rain stops,
# the grass stays wet for a while. Once cumulative rainfall over the window
# ages past 3h/6h and drops below the threshold, mowing is allowed again.
#
# The rolling sums are HA's built-in `statistics` platform sensors (see the
# top-level `sensor:` block near the end of this file), feeding off
# `sensor.rain_current_hour` and re-sampling every 15 min.
#
# Approach inspired by simon42.com's Luba-2 automation, adjusted for Met.no's
# hourly forecast shape (which doesn't expose a native probability field).
# =============================================================================


# -----------------------------------------------------------------------------
# HELPERS: on/off gates
# -----------------------------------------------------------------------------
input_boolean:
  mowing_automation_enabled:
    name: Mowing Automation Enabled
    icon: mdi:robot-mower

  do_not_mow:
    name: Do Not Mow
    icon: mdi:robot-mower-off
    # Auto-managed by rain/night automations. Turn on manually to pause mowing.
    # This is an INTERLOCK (on = blocked), not a permission — the naming is
    # a bit misleading. Read: "off = green light, on = stop".

  block_night_mowing:
    name: Block Night Mowing
    icon: mdi:weather-night


# -----------------------------------------------------------------------------
# HELPERS: per-zone rolling mow-history
#   <zone>_last_mow_1/2/3 = rolling history of the last three mows (1 = newest)
# -----------------------------------------------------------------------------
input_datetime:
  garten_last_mow_1:
    name: Garten Last Mow 1
    has_date: true
    has_time: true
  garten_last_mow_2:
    name: Garten Last Mow 2
    has_date: true
    has_time: true
  garten_last_mow_3:
    name: Garten Last Mow 3
    has_date: true
    has_time: true

  seite_last_mow_1:
    name: Seite Last Mow 1
    has_date: true
    has_time: true
  seite_last_mow_2:
    name: Seite Last Mow 2
    has_date: true
    has_time: true
  seite_last_mow_3:
    name: Seite Last Mow 3
    has_date: true
    has_time: true


# -----------------------------------------------------------------------------
# HELPERS: dashboard-facing text
# -----------------------------------------------------------------------------
input_text:
  reason_no_mow:
    name: Reason No Mow
    initial: ""
    max: 100

  last_lawn_mowed:
    name: Last Lawn Mowed
    initial: ""
    max: 100


# -----------------------------------------------------------------------------
# TEMPLATE SENSORS
# -----------------------------------------------------------------------------
template:
  # --- Per-zone days-since-mow ------------------------------------------------
  - sensor:
      - name: "Garten Days Since Mow"
        unique_id: garten_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.garten_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

      - name: "Seite Days Since Mow"
        unique_id: seite_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.seite_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

  # --- Rain forecast (Met.no via weather.forecast_home) -----------------------
  # Refreshes every 15 minutes and at HA start; calls weather.get_forecasts
  # and derives three sensors:
  #
  #   sensor.rain_today        (mm)  = sum of precipitation across today's
  #                                    remaining hourly forecast slots
  #   sensor.rain_probability  (%)   = fraction of today's remaining hourly
  #                                    forecast slots with precipitation > 0
  #                                    (Met.no has no native probability field;
  #                                    this is a proxy)
  #   sensor.rain_current_hour (mm)  = precipitation forecast for the NEXT
  #                                    hourly slot (forecast[0]) — feeds the
  #                                    3h/6h rolling statistics sensors AND
  #                                    the "raining now" automation gate
  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: fc
    sensor:
      - name: "Rain Today"
        unique_id: rain_today
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {{ (slots | map(attribute='precipitation') | map('float', 0) | sum) | round(2) }}

      - name: "Rain Probability"
        unique_id: rain_probability
        unit_of_measurement: "%"
        icon: mdi:weather-pouring
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {% set wet = slots
               | selectattr('precipitation', '>', 0)
               | list | count %}
            {{ ((wet / (slots | count)) * 100) | round(0) | int }}
          {% endif %}

      - name: "Rain Current Hour"
        unique_id: rain_current_hour
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state_class: measurement  # required for the statistics platform below
        state: >
          {% set slots = fc['weather.forecast_home'].forecast %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {{ (slots[0].precipitation | float(0)) | round(2) }}
          {% endif %}


# -----------------------------------------------------------------------------
# LEGACY-PLATFORM SENSORS: rolling-window rain statistics
#
# HA's built-in `statistics` platform (still YAML-only) samples an input
# sensor over a moving time window and exposes aggregates. We use `sum` over
# 3h and 6h windows against sensor.rain_current_hour to build the
# "cumulative recent rainfall" values.
#
# NOTE ON RESTART REQUIREMENT: legacy-platform sensors like `statistics`
# don't hot-reload. Adding or changing them requires a full HA restart to
# take effect. Modifying just the automation/template/script parts in this
# package can still be done via reload_core targets without a restart.
# -----------------------------------------------------------------------------
sensor:
  - platform: statistics
    name: "Rain Last 3h"
    unique_id: rain_last_3h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 20
    max_age:
      hours: 3

  - platform: statistics
    name: "Rain Last 6h"
    unique_id: rain_last_6h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 40
    max_age:
      hours: 6


# -----------------------------------------------------------------------------
# SCRIPTS
#
# script.mow_lawn is the parameterized worker (zone_slug / zone_button /
# zone_label). It carries the up-front guards so scheduler-component slots
# and dashboard buttons all short-circuit cleanly when conditions block.
#
# script.mow_garten / script.mow_seite are per-zone wrapper shims that call
# mow_lawn with hard-coded fields. scheduler-card can't pass service_data,
# so schedules point at these wrappers by name instead.
# -----------------------------------------------------------------------------
script:
  mow_lawn:
    alias: Mow Lawn (parameterized)
    icon: mdi:robot-mower
    mode: parallel
    max: 5
    fields:
      zone_slug:
        description: "Zone slug used to derive helper entity ids (garten, seite, ...)"
        example: "garten"
        selector:
          text:
      zone_button:
        description: "Saved-task button entity_id for this zone"
        example: "button.garten_yuka_mnu7nps5_aufgabe_1"
        selector:
          entity:
            domain: button
      zone_label:
        description: "Human-readable label for dashboards / notifications"
        example: "Garten"
        selector:
          text:
    sequence:
      # ============================================================
      # UP-FRONT GUARDS
      # scheduler-component fires this script at scheduled times, so
      # we gate everything here (no separate scheduler automation).
      # ============================================================
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.do_not_mow
        state: "off"
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: mowing
          - condition: state
            entity_id: lawn_mower.yuka_mnu7nps5
            state: returning

      # ============================================================
      # Per-zone entity-id bindings (derived from zone_slug field)
      # ============================================================
      - variables:
          e_last_1: "input_datetime.{{ zone_slug }}_last_mow_1"
          e_last_2: "input_datetime.{{ zone_slug }}_last_mow_2"
          e_last_3: "input_datetime.{{ zone_slug }}_last_mow_3"

      # Roll last-mow history (3 <- 2, 2 <- 1, 1 <- now).
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_3 }}"
        data:
          datetime: "{{ states(e_last_2) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_2 }}"
        data:
          datetime: "{{ states(e_last_1) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ e_last_1 }}"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Record which lawn just started.
      - action: input_text.set_value
        target:
          entity_id: input_text.last_lawn_mowed
        data:
          value: "{{ zone_label }}"

      # Fire the saved-task button.
      - action: button.press
        target:
          entity_id: "{{ zone_button }}"

  # ---------------------------------------------------------------------------
  # Per-zone wrapper scripts.
  # scheduler-card cannot pass service_data to script.* actions, so each
  # zone gets a no-argument wrapper that calls script.mow_lawn with its
  # zone identity hard-coded.
  # ---------------------------------------------------------------------------
  mow_garten:
    alias: Mow Garten
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: garten
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_1
          zone_label: Garten

  mow_seite:
    alias: Mow Seite
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: seite
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_3
          zone_label: Seite


# -----------------------------------------------------------------------------
# AUTOMATIONS
#
# Four rain/night automations. Trigger every 15 min or on sunrise/sunset
# events; they write to input_boolean.do_not_mow to gate the scripts.
# -----------------------------------------------------------------------------
automation:
  # ---------------------------------------------------------------------------
  # Rain / damp grass — block mowing.
  #
  # Fires every 15 min and turns on do_not_mow if ANY rain signal fires.
  # The reason text explains WHICH signal fired (helps troubleshoot without
  # reading the automation trace).
  # ---------------------------------------------------------------------------
  - id: do_not_mow_if_rain
    alias: Do Not Mow if Rain
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition:
      - condition: or
        conditions:
          # Forecast for today.
          - condition: template
            value_template: >
              {{ states('sensor.rain_today') | float(0) > 3 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_probability') | float(0) > 50 }}
          # Raining now / next hour.
          - condition: template
            value_template: >
              {{ states('sensor.rain_current_hour') | float(0) > 0.5 }}
          # Damp-grass heuristic: recent cumulative rainfall.
          - condition: template
            value_template: >
              {{ states('sensor.rain_last_3h') | float(0) > 5 }}
          - condition: template
            value_template: >
              {{ states('sensor.rain_last_6h') | float(0) > 25 }}
          # Current weather condition is actively wet.
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: >
            {% set c = states('weather.forecast_home') %}
            {% set now_h = states('sensor.rain_current_hour') | float(0) %}
            {% set l3 = states('sensor.rain_last_3h') | float(0) %}
            {% set l6 = states('sensor.rain_last_6h') | float(0) %}
            {% set td = states('sensor.rain_today') | float(0) %}
            {% set pb = states('sensor.rain_probability') | float(0) %}
            {% if c in ['rainy','pouring','lightning-rainy','lightning','hail','snowy','snowy-rainy'] %}raining ({{ c }})
            {% elif now_h > 0.5 %}raining now ({{ now_h }}mm/h)
            {% elif l3 > 5 %}wet grass ({{ l3 }}mm last 3h)
            {% elif l6 > 25 %}wet grass ({{ l6 }}mm last 6h)
            {% elif td > 3 %}rain today ({{ td }}mm forecast)
            {% else %}rain soon ({{ pb }}%)
            {% endif %}

  # ---------------------------------------------------------------------------
  # Reset do_not_mow when ALL rain signals are dry.
  # Only during the day, so it doesn't undo the night-block below.
  # ---------------------------------------------------------------------------
  - id: reset_do_not_mow_if_dry
    alias: Reset Do Not Mow if Dry
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition:
      - condition: sun
        after: sunrise
        after_offset: "01:00:00"
        before: sunset
        before_offset: "-01:00:00"
      # ALL rain signals must be dry (using float(0) so a missing sensor
      # reads as 0 = dry, matching the graceful-degradation semantics).
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50
             and states('sensor.rain_current_hour') | float(0) <= 0.5
             and states('sensor.rain_last_3h') | float(0) <= 5
             and states('sensor.rain_last_6h') | float(0) <= 25 }}
      # Weather condition must not be actively wet.
      - condition: not
        conditions:
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow

  # ---------------------------------------------------------------------------
  # Night block (only when block_night_mowing is enabled).
  # ---------------------------------------------------------------------------
  - id: block_mowing_at_night
    alias: Block Mowing at Night
    mode: single
    trigger:
      - platform: sun
        event: sunset
        offset: "-01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.do_not_mow
      - action: input_text.set_value
        target:
          entity_id: input_text.reason_no_mow
        data:
          value: night time

  # ---------------------------------------------------------------------------
  # Allow mowing at sunrise — but only if all rain signals are dry too.
  # Otherwise a wet morning would clear do_not_mow just because sunrise fired.
  # ---------------------------------------------------------------------------
  - id: allow_mowing_at_sunrise
    alias: Allow Mowing at Sunrise
    mode: single
    trigger:
      - platform: sun
        event: sunrise
        offset: "01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.block_night_mowing
        state: "on"
      - condition: template
        value_template: >
          {{ states('sensor.rain_today') | float(0) <= 3
             and states('sensor.rain_probability') | float(0) <= 50
             and states('sensor.rain_current_hour') | float(0) <= 0.5
             and states('sensor.rain_last_3h') | float(0) <= 5
             and states('sensor.rain_last_6h') | float(0) <= 25 }}
      - condition: not
        conditions:
          - condition: state
            entity_id: weather.forecast_home
            state:
              - rainy
              - pouring
              - lightning-rainy
              - lightning
              - hail
              - snowy
              - snowy-rainy
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.do_not_mow
