# =============================================================================
# Luba Mower Smart Scheduler — Home Assistant package  (paschdan live install)
# =============================================================================
# Single-automation setup: one mower_dispatch automation handles both
# "start a new mow" and "record a completion". Alternation between zones
# is DERIVED from the last-mow timestamps (whichever zone was mowed longest
# ago gets the next slot) — no separate alternation state variable.
#
# All rain / night / weather gating is folded into ONE template
# binary_sensor (binary_sensor.mow_blocked) with a companion text sensor
# (sensor.mow_block_reason) showing which signal is triggering the block.
#
# Wired entities in this HA instance:
#   Mower       : lawn_mower.yuka_mnu7nps5  (Mammotion Yuka)
#   Zone 1      : "Garten"  -> button.garten_yuka_mnu7nps5_aufgabe_1
#   Zone 2      : "Seite"   -> button.garten_yuka_mnu7nps5_aufgabe_3
#   Rain source : weather.forecast_home (Met.no) via a trigger-based template
#                 that polls weather.get_forecasts (hourly) every 15 min.
#   Battery     : sensor.yuka_mnu7nps5_battery
#   GPS         : device_tracker.yuka_mnu7nps5_yuka_mnu7nps5
#   Camera      : camera.yuka_mnu7nps5_none
#
# =============================================================================
# ARCHITECTURE — ONE AUTOMATION
# =============================================================================
# mower_dispatch has three triggers, branched by trigger.id:
#
#   trigger.id: try
#     - platform: time         at: 09:00        (daily attempt)
#     - platform: state        binary_sensor.mow_blocked on -> off  (rain cleared)
#     → runs 'try' action branch
#
#   trigger.id: completed
#     - platform: state        sensor.yuka_mnu7nps5_activity_mode -> MODE_READY  for 2 min
#     → runs 'completed' action branch
#
# TRY branch guards (all must pass):
#   - input_boolean.mowing_automation_enabled = on
#   - binary_sensor.mow_blocked               = off
#   - sensor.yuka_mnu7nps5_activity_mode      = MODE_READY  (docked, idle)
#   - Before sunset - 3h
#
# TRY branch action:
#   Pick next zone = whichever of {garten, seite} has the OLDER _last_mow_1
#   timestamp. Check spacing (≥ 2 days since same zone last completed). If
#   OK, call script.mow_<zone>.
#
# COMPLETED branch guards:
#   - sensor.yuka_mnu7nps5_progress >= 100  (task actually finished)
#   - input_text.last_lawn_mowed in ['Garten', 'Seite']
#     (i.e. our script started this mow — the marker is our attribution
#     handle; empty marker = we didn't dispatch, don't record)
#
# COMPLETED branch action:
#   Roll the completed zone's history (last_mow_3 <- 2, 2 <- 1, 1 <- now).
#   That advances the zone's timestamp, so next TRY dispatch will pick the
#   OTHER zone (natural alternation from timestamps). Clear last_lawn_mowed
#   marker so subsequent MODE_READY events (mower re-docks after storm, HA
#   restart, ...) don't re-record.
#
# Rain-interrupt behavior:
#   - Garten dispatched at 09:00. script.mow_lawn only sets last_lawn_mowed;
#     it does NOT bump garten_last_mow_1. So Garten's timestamp is still the
#     PREVIOUS successful completion (e.g. 4 days ago).
#   - Rain forces mower into MODE_PAUSE. mower_paused_continue (your
#     independent automation) handles resumption attempts.
#   - If mow completes: MODE_READY → mower_dispatch completed branch fires
#     → garten_last_mow_1 = now → Seite is now the older one → tomorrow's
#     TRY picks Seite.
#   - If mow never completes today: garten_last_mow_1 stays at "4 days ago",
#     so tomorrow's TRY still picks Garten. It keeps trying until it
#     completes. Alternation is preserved.
#
# =============================================================================
# WHAT'S HERE
# =============================================================================
# - 3 input_boolean helpers (mowing_automation_enabled, do_not_mow (legacy,
#   unused), block_night_mowing)
# - 6 input_datetime helpers (garten/seite _last_mow_1/2/3)
# - 2 input_text helpers (last_lawn_mowed, reason_no_mow (legacy, unused))
# - Template sensors:
#     - Garten/Seite Days Since Mow
#     - Yuka Blade Wear Overdue
#     - Rain Today / Rain Probability / Rain Current Hour (trigger-based)
#     - Mow Block Reason (state-based)
# - Template binary_sensor: Mow Blocked
# - Legacy-platform sensors: Rain Last 3h / Rain Last 6h (statistics)
# - 3 scripts (mow_lawn parameterized + mow_garten/mow_seite wrappers)
# - 1 automation (mower_dispatch)
#
# NOTE: input_boolean.do_not_mow and input_text.reason_no_mow are LEGACY —
# defined here but no longer written by any automation. Kept in the YAML so
# HA still creates them (users may have dashboard rows referencing them);
# can be removed once you've cleaned dashboard references.
#
# =============================================================================
# RAIN & DAMP-GRASS HEURISTIC (unchanged from previous version)
# =============================================================================
# Six signals feed binary_sensor.mow_blocked. Mowing is blocked when ANY:
#   sensor.rain_today        > 3 mm     forecast for today
#   sensor.rain_probability  > 50 %     fraction of today's rain hours
#   sensor.rain_current_hour > 0.5 mm   current hour forecast
#   sensor.rain_last_3h      > 5 mm     rolling-sum damp grass
#   sensor.rain_last_6h      > 25 mm    rolling-sum heavy rain earlier
#   weather.forecast_home in {rainy, pouring, lightning-rainy, lightning,
#                             hail, snowy, snowy-rainy}
#   PLUS night block: block_night_mowing = on AND (sun below horizon OR
#                     within 1h of next sunset).
#
# Approach inspired by simon42.com's Luba-2 automation, adjusted for Met.no.
# =============================================================================


# -----------------------------------------------------------------------------
# HELPERS: on/off gates
# -----------------------------------------------------------------------------
input_boolean:
  mowing_automation_enabled:
    name: Mowing Automation Enabled
    icon: mdi:robot-mower

  block_night_mowing:
    name: Block Night Mowing
    icon: mdi:weather-night

  # LEGACY — no longer written by any automation. Kept only so old dashboard
  # entries don't break. Remove once you've cleaned dashboard references
  # (they should point at binary_sensor.mow_blocked instead).
  do_not_mow:
    name: Do Not Mow (legacy, unused)
    icon: mdi:robot-mower-off


# -----------------------------------------------------------------------------
# HELPERS: per-zone rolling mow-history
#   <zone>_last_mow_1/2/3 = rolling history of the last three COMPLETED mows
#     (bumped in mower_dispatch's Branch C on MODE_RETURNING -> MODE_READY).
#     Drives sensor.<zone>_days_since_mow.
#   <zone>_last_start = timestamp of the last DISPATCH for this zone
#     (set by script.mow_lawn on every dispatch, whether it completes or not).
#     Drives the spacing guard AND the same-day-chain rule in mower_dispatch.
# -----------------------------------------------------------------------------
input_datetime:
  garten_last_mow_1: { name: Garten Last Mow 1, has_date: true, has_time: true }
  garten_last_mow_2: { name: Garten Last Mow 2, has_date: true, has_time: true }
  garten_last_mow_3: { name: Garten Last Mow 3, has_date: true, has_time: true }
  seite_last_mow_1:  { name: Seite Last Mow 1,  has_date: true, has_time: true }
  seite_last_mow_2:  { name: Seite Last Mow 2,  has_date: true, has_time: true }
  seite_last_mow_3:  { name: Seite Last Mow 3,  has_date: true, has_time: true }

# ADDITIONAL storage-mode input_datetime helpers (created via UI/API, not
# declared here):
#   input_datetime.garten_last_start
#   input_datetime.seite_last_start
# These hold the timestamp of the last DISPATCH (not completion) for each
# zone. Used by mower_dispatch for spacing checks and the same-day-chain
# guard. Create via: Settings > Devices & Services > Helpers > Date/time.


# -----------------------------------------------------------------------------
# HELPERS: dashboard-facing text
# -----------------------------------------------------------------------------
input_text:
  last_lawn_mowed:
    name: Last Lawn Mowed
    initial: ""
    max: 100
    # Set by script.mow_lawn on dispatch. Read by mower_dispatch's completed
    # branch to know which zone to credit on MODE_READY. Cleared on completion.

  # LEGACY — replaced by sensor.mow_block_reason. Kept for old dashboard
  # references. Remove when dashboard is cleaned up.
  reason_no_mow:
    name: Reason No Mow (legacy, unused)
    initial: ""
    max: 100

# ADDITIONAL STORAGE-MODE HELPER (not defined here, created via UI/API):
#   input_text.last_dispatched_zone
#     Set by script.mow_lawn on every dispatch. NEVER cleared automatically.
#     Used by Branch A alternation: 'next_zone = the other of last_dispatched'.
#     This ensures alternation advances even if a mow was interrupted.
#     Create via: Settings > Devices & Services > Helpers > Create > Text.


# -----------------------------------------------------------------------------
# TEMPLATE SENSORS + BINARY_SENSOR
# -----------------------------------------------------------------------------
template:
  # --- State-based (updates whenever any source entity changes) --------------
  - sensor:
      - name: "Garten Days Since Mow"
        unique_id: garten_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.garten_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

      - name: "Seite Days Since Mow"
        unique_id: seite_days_since_mow
        unit_of_measurement: "d"
        icon: mdi:calendar-check
        state: >
          {% set ts = state_attr('input_datetime.seite_last_mow_1', 'timestamp') %}
          {% if ts %}{{ ((now().timestamp() - ts) / 86400) | round(0) | int }}{% else %}unknown{% endif %}

      # Blade wear: positive value = OVERDUE (mowed longer than warning
      # threshold). Negative = still within budget.
      - name: "Yuka Blade Wear Overdue"
        unique_id: yuka_blade_wear_overdue
        unit_of_measurement: "h"
        icon: mdi:saw-blade
        state: >
          {% set used = states('sensor.yuka_mnu7nps5_blade_used_time') | float(0) %}
          {% set warn = states('sensor.yuka_mnu7nps5_blade_wear_warning_time') | float(0) %}
          {{ (used - warn) | round(1) }}

      # Reason string — which signal is currently blocking the mow (empty
      # if nothing is blocking).
      - name: "Mow Block Reason"
        unique_id: mow_block_reason
        icon: mdi:information-outline
        state: >
          {% set c = states('weather.forecast_home') %}
          {% set now_h = states('sensor.rain_current_hour') | float(0) %}
          {% set l3 = states('sensor.rain_last_3h') | float(0) %}
          {% set l6 = states('sensor.rain_last_6h') | float(0) %}
          {% set td = states('sensor.rain_today') | float(0) %}
          {% set pb = states('sensor.rain_probability') | float(0) %}
          {% set night = is_state('input_boolean.block_night_mowing','on') and (
              is_state('sun.sun','below_horizon') or
              (as_timestamp(state_attr('sun.sun','next_setting') or 0) - as_timestamp(now())) < 3600
            ) %}
          {% if night %}night time
          {% elif c in ['rainy','pouring','lightning-rainy','lightning','hail','snowy','snowy-rainy'] %}raining ({{ c }})
          {% elif now_h > 0.5 %}raining now ({{ now_h }}mm/h)
          {% elif l3 > 5 %}wet grass ({{ l3 }}mm last 3h)
          {% elif l6 > 25 %}wet grass ({{ l6 }}mm last 6h)
          {% elif td > 3 %}rain today ({{ td }}mm forecast)
          {% elif pb > 50 %}rain soon ({{ pb }}%)
          {% else %}
          {% endif %}

    binary_sensor:
      # THE mowing gate. On = blocked. Off = mow-allowed.
      # OR of all rain signals + night block.
      - name: "Mow Blocked"
        unique_id: mow_blocked
        icon: mdi:robot-mower-off
        state: >
          {% set rain_today = states('sensor.rain_today') | float(0) > 3 %}
          {% set rain_prob  = states('sensor.rain_probability') | float(0) > 50 %}
          {% set rain_now   = states('sensor.rain_current_hour') | float(0) > 0.5 %}
          {% set rain_3h    = states('sensor.rain_last_3h') | float(0) > 5 %}
          {% set rain_6h    = states('sensor.rain_last_6h') | float(0) > 25 %}
          {% set weather_wet = states('weather.forecast_home') in
             ['rainy','pouring','lightning-rainy','lightning','hail','snowy','snowy-rainy'] %}
          {% set night_block = is_state('input_boolean.block_night_mowing','on') and (
              is_state('sun.sun','below_horizon') or
              (as_timestamp(state_attr('sun.sun','next_setting') or 0) - as_timestamp(now())) < 3600
            ) %}
          {{ rain_today or rain_prob or rain_now or rain_3h or rain_6h or weather_wet or night_block }}

  # --- Trigger-based (poll Met.no forecast every 15 min) ---------------------
  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: fc
    sensor:
      - name: "Rain Today"
        unique_id: rain_today
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {{ (slots | map(attribute='precipitation') | map('float', 0) | sum) | round(2) }}

      - name: "Rain Probability"
        unique_id: rain_probability
        unit_of_measurement: "%"
        icon: mdi:weather-pouring
        state: >
          {% set today = now().date() | string %}
          {% set slots = fc['weather.forecast_home'].forecast
             | selectattr('datetime', 'search', today)
             | selectattr('precipitation', 'defined')
             | list %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {% set wet = slots | selectattr('precipitation', '>', 0) | list | count %}
            {{ ((wet / (slots | count)) * 100) | round(0) | int }}
          {% endif %}

      - name: "Rain Current Hour"
        unique_id: rain_current_hour
        unit_of_measurement: "mm"
        icon: mdi:weather-rainy
        state_class: measurement
        state: >
          {% set slots = fc['weather.forecast_home'].forecast %}
          {% if slots | count == 0 %}
            0
          {% else %}
            {{ (slots[0].precipitation | float(0)) | round(2) }}
          {% endif %}


# -----------------------------------------------------------------------------
# LEGACY-PLATFORM SENSORS: rolling-window rain statistics
# -----------------------------------------------------------------------------
sensor:
  - platform: statistics
    name: "Rain Last 3h"
    unique_id: rain_last_3h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 20
    max_age:
      hours: 3

  - platform: statistics
    name: "Rain Last 6h"
    unique_id: rain_last_6h
    entity_id: sensor.rain_current_hour
    state_characteristic: sum
    sampling_size: 40
    max_age:
      hours: 6



# -----------------------------------------------------------------------------
# SCRIPTS
# -----------------------------------------------------------------------------
script:
  mow_lawn:
    alias: Mow Lawn (parameterized)
    icon: mdi:robot-mower
    mode: parallel
    max: 5
    fields:
      zone_slug:
        description: "Zone slug (garten, seite, ...)"
        example: "garten"
        selector:
          text:
      zone_button:
        description: "Saved-task button entity_id"
        example: "button.garten_yuka_mnu7nps5_aufgabe_1"
        selector:
          entity:
            domain: button
      zone_label:
        description: "Human-readable label"
        example: "Garten"
        selector:
          text:
    sequence:
      # Guards (mirror mower_dispatch Branch A; dashboard buttons call this
      # script directly so we re-check here).
      - condition: state
        entity_id: input_boolean.mowing_automation_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.mow_blocked
        state: "off"
      - condition: state
        entity_id: sensor.yuka_mnu7nps5_activity_mode
        state: MODE_READY

      # Completion-attribution marker (cleared in Branch C on completion).
      - action: input_text.set_value
        target:
          entity_id: input_text.last_lawn_mowed
        data:
          value: "{{ zone_label }}"

      # Alternation memory (NEVER cleared automatically). Ensures next Branch A
      # picks the OTHER zone even if this mow doesn't complete.
      - action: input_text.set_value
        target:
          entity_id: input_text.last_dispatched_zone
        data:
          value: "{{ zone_label }}"

      # DISPATCH timestamp for this zone. Used by mower_dispatch for:
      #   1. Spacing guard (>= 1.5 days between same-zone dispatches).
      #   2. Same-day-chain rule (if THIS zone was started earlier today,
      #      don't dispatch again; if it started YESTERDAY or earlier, a
      #      chain-to-the-other-zone same-day is allowed as recovery).
      - action: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.{{ zone_slug }}_last_start"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Fire the saved-task button.
      - action: button.press
        target:
          entity_id: "{{ zone_button }}"

  mow_garten:
    alias: Mow Garten
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: garten
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_1
          zone_label: Garten

  mow_seite:
    alias: Mow Seite
    icon: mdi:robot-mower
    mode: parallel
    max: 3
    sequence:
      - action: script.mow_lawn
        data:
          zone_slug: seite
          zone_button: button.garten_yuka_mnu7nps5_aufgabe_3
          zone_label: Seite


# -----------------------------------------------------------------------------
# AUTOMATIONS
# -----------------------------------------------------------------------------
automation:
  - id: mower_dispatch
    alias: Mower Dispatch
    mode: single
    trigger:
      # TRY: might be time to start (or resume) a mow.
      - platform: time
        at: "09:00:00"
        id: try
      - platform: state
        entity_id: binary_sensor.mow_blocked
        from: "on"
        to: "off"
        id: try
      - platform: state
        entity_id: sensor.yuka_mnu7nps5_battery
        to: "100"
        id: try
      # COMPLETED: mower drove home after finishing a task.
      # Fires INSTANTLY (no `for:`) because the Yuka's `progress` sensor
      # resets to 0 within milliseconds of MODE_READY.
      - platform: state
        entity_id: sensor.yuka_mnu7nps5_activity_mode
        from: MODE_RETURNING
        to: MODE_READY
        id: completed
    action:
      - choose:
          # =========================================================
          # Branch A: START a fresh mow (mower idle at dock).
          #
          # Rules:
          #   - Alternation: input_text.last_dispatched_zone.
          #   - Spacing: last DISPATCH (not last completion) of the picked
          #     zone was >= 1.5 days ago.
          #   - Daily-cadence: allow only if the PICKED zone hasn't been
          #     started today. The OTHER zone may have been started today
          #     (chain-after-recovery case is allowed).
          #   - Sunday: no dispatch (weekday != 6, Monday=0).
          #   - Before sunset - 3h.
          # =========================================================
          - conditions:
              - condition: trigger
                id: try
              - condition: state
                entity_id: input_boolean.mowing_automation_enabled
                state: "on"
              - condition: state
                entity_id: binary_sensor.mow_blocked
                state: "off"
              - condition: state
                entity_id: sensor.yuka_mnu7nps5_activity_mode
                state: MODE_READY
              - condition: state
                entity_id: input_text.last_lawn_mowed
                state: ""
              # No mowing on Sunday.
              - condition: template
                value_template: "{{ now().weekday() != 6 }}"
              - condition: sun
                before: sunset
                before_offset: "-03:00:00"
            sequence:
              - variables:
                  last_dispatched: "{{ states('input_text.last_dispatched_zone') }}"
                  garten_start_ts: "{{ state_attr('input_datetime.garten_last_start','timestamp') | float(0) }}"
                  seite_start_ts:  "{{ state_attr('input_datetime.seite_last_start','timestamp')  | float(0) }}"
                  today: "{{ now().date() | string }}"
                  garten_started_today: >-
                    {{ garten_start_ts > 0 and
                       (garten_start_ts | as_datetime | as_local).date() | string == today }}
                  seite_started_today: >-
                    {{ seite_start_ts > 0 and
                       (seite_start_ts | as_datetime | as_local).date() | string == today }}
                  next_zone: >-
                    {% if last_dispatched == 'Garten' %}seite
                    {% elif last_dispatched == 'Seite' %}garten
                    {% else %}{{ 'garten' if garten_start_ts <= seite_start_ts else 'seite' }}
                    {% endif %}
                  target_start_ts: "{{ garten_start_ts if next_zone == 'garten' else seite_start_ts }}"
                  days_since_start: >-
                    {{ ((now().timestamp() - target_start_ts) / 86400) if target_start_ts else 999 }}
                  spacing_ok: "{{ days_since_start | float(999) >= 1.5 }}"
                  target_started_today: >-
                    {{ garten_started_today if next_zone == 'garten' else seite_started_today }}
                  daily_ok: "{{ not target_started_today }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ spacing_ok }}"
                      - condition: template
                        value_template: "{{ daily_ok }}"
                    sequence:
                      - action: "script.mow_{{ next_zone }}"

          # =========================================================
          # Branch B: RESUME a paused mow.
          # Same guards as A minus daily/Sunday (we're finishing existing
          # work, not starting new). Mammotion firmware treats
          # lawn_mower.start_mowing on MODE_PAUSE as 'continue paused task'.
          # =========================================================
          - conditions:
              - condition: trigger
                id: try
              - condition: state
                entity_id: input_boolean.mowing_automation_enabled
                state: "on"
              - condition: state
                entity_id: binary_sensor.mow_blocked
                state: "off"
              - condition: state
                entity_id: sensor.yuka_mnu7nps5_activity_mode
                state: MODE_PAUSE
              - condition: sun
                before: sunset
                before_offset: "-03:00:00"
            sequence:
              - action: lawn_mower.start_mowing
                target:
                  entity_id: lawn_mower.yuka_mnu7nps5

          # =========================================================
          # Branch C: COMPLETED — record the completion.
          # Bumps <zone>_last_mow_1 (drives days_since_mow sensor).
          # Alternation and spacing are already handled by
          # last_dispatched_zone and <zone>_last_start (both set in
          # script.mow_lawn on dispatch), not by this.
          # =========================================================
          - conditions:
              - condition: trigger
                id: completed
              - condition: template
                value_template: "{{ states('input_text.last_lawn_mowed') in ['Garten', 'Seite'] }}"
            sequence:
              - variables:
                  completed_zone: "{{ 'garten' if states('input_text.last_lawn_mowed') == 'Garten' else 'seite' }}"
              - action: input_datetime.set_datetime
                target:
                  entity_id: "input_datetime.{{ completed_zone }}_last_mow_3"
                data:
                  datetime: "{{ states('input_datetime.' ~ completed_zone ~ '_last_mow_2') }}"
              - action: input_datetime.set_datetime
                target:
                  entity_id: "input_datetime.{{ completed_zone }}_last_mow_2"
                data:
                  datetime: "{{ states('input_datetime.' ~ completed_zone ~ '_last_mow_1') }}"
              - action: input_datetime.set_datetime
                target:
                  entity_id: "input_datetime.{{ completed_zone }}_last_mow_1"
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.last_lawn_mowed
                data:
                  value: ""
