# Mow scripts, one per zone.
# Add under   script: !include scripts.yaml   in configuration.yaml
#
# IMPORTANT (2026 update): these press the mower's SAVED-TASK BUTTON for the zone
# instead of calling mammotion.start_mow with area switches. On Mammotion-HA 0.6.x
# each saved task/map area is exposed as a button entity (e.g. button.mower_lawn_1),
# and pressing it runs that task using the speed/angle/blade settings you saved in
# the Mammotion app. This is far more robust than start_mow across integration updates,
# and it means you tune the mow (including the cutting angle) in the app, where you can
# see it on the map.
#
# Replace in every script:
#   lawn_mower.mower   -> your mower entity   (Developer Tools > States, search lawn_mower.)
#   button.mower_<zone> -> the saved-task button for that zone (search button. )
#                          The button name comes from the task name in the app.

mow_lawn_1:
  alias: Mow Lawn 1
  icon: mdi:robot-mower
  sequence:
    # Skip if the mower is already out.
    - condition: template
      value_template: "{{ states('lawn_mower.mower') not in ['mowing', 'returning'] }}"
    # Roll the last-mow history (1 = most recent).
    - action: input_datetime.set_datetime
      target: { entity_id: input_datetime.lawn_1_last_mow_3 }
      data: { datetime: "{{ states('input_datetime.lawn_1_last_mow_2') }}" }
    - action: input_datetime.set_datetime
      target: { entity_id: input_datetime.lawn_1_last_mow_2 }
      data: { datetime: "{{ states('input_datetime.lawn_1_last_mow_1') }}" }
    - action: input_datetime.set_datetime
      target: { entity_id: input_datetime.lawn_1_last_mow_1 }
      data: { datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}" }
    - action: input_text.set_value
      target: { entity_id: input_text.last_lawn_mowed }
      data: { value: "Lawn 1" }
    # Start the saved app task for this zone.
    - action: button.press
      target: { entity_id: button.mower_lawn_1 }
    # Reschedule the next run from the chosen frequency.
    - action: input_datetime.set_datetime
      target: { entity_id: input_datetime.lawn_1_next_time }
      data:
        datetime: >
          {% if is_state('input_select.lawn_1_schedule', 'once per week') %}
            {{ (now() + timedelta(days=7)).strftime('%Y-%m-%d %H:%M:%S') }}
          {% elif is_state('input_select.lawn_1_schedule', 'twice per week') %}
            {{ (now() + timedelta(days=3)).strftime('%Y-%m-%d %H:%M:%S') }}
          {% else %}
            {{ (now() + timedelta(days=365)).strftime('%Y-%m-%d %H:%M:%S') }}
          {% endif %}

